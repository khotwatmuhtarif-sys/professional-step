              ${p.status !== 'مدفوعة' ? `<button class="submit-btn" onclick="clientUploadReceipt(${Number(p.number)})">📎 ${p.receipt ? 'استبدال الإيصال' : 'رفع إيصال التحويل'}</button>` : ''}
              ${p.receipt ? `<button class="submit-btn" style="background:#64748b" onclick="openAttachment('${p.receipt}', '${psafe(p.receiptName || 'receipt')}')">👁️ عرض الإيصال</button>` : ''}
              ${p.receipt && p.status !== 'مدفوعة' ? `<button class="submit-btn red" onclick="clientDeleteReceipt(${Number(p.number)})">🗑 حذف الإيصال</button>` : ''}
              ${p.invoice ? `<button class="submit-btn green" onclick="openAttachment('${p.invoice}', '${psafe(p.invoiceName || 'invoice')}')">🧾 عرض الفاتورة</button>` : ''}
            </div>
          </div>
          <span class="payment-amount">${Number(p.amount || 0).toLocaleString()} ر</span>
        </div>
      `).join('') : '<div class="card" style="text-align:center">لا يوجد جدول دفعات محفوظ لهذا العميل</div>'}
    `;
  };
  clientPayments = window.clientPayments;

  window.clientUploadReceipt = function(paymentNumber){
    const client = getCurrentClient();
    if(!client.id) return showToast('العميل غير موجود');
    const payment = normalizePayments(client).find(p => Number(p.number) === Number(paymentNumber));
    if(!payment) return showToast('الدفعة غير موجودة');
    if(payment.status === 'مدفوعة') return showToast('لا يمكن تعديل إيصال دفعة معتمدة');
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*,application/pdf';
    input.onchange = () => {
      const file = input.files && input.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        payment.receipt = reader.result;
        payment.receiptName = file.name;
        payment.status = 'بانتظار المراجعة';
        payment.note = payment.receiptName ? 'تم رفع/استبدال إيصال من العميل' : 'تم رفع إيصال من العميل';
        await persistClient(client);
        showToast('✅ تم رفع الإيصال وبانتظار اعتماد الإدارة');
        renderPanel('payments');
      };
      reader.readAsDataURL(file);
    };
    input.click();
  };

  window.clientDeleteReceipt = async function(paymentNumber){
    const client = getCurrentClient();
    const payment = normalizePayments(client).find(p => Number(p.number) === Number(paymentNumber));
    if(!payment || !payment.receipt) return showToast('لا يوجد إيصال');
    if(payment.status === 'مدفوعة') return showToast('لا يمكن حذف إيصال دفعة معتمدة');
    if(!confirm('هل أنت متأكد من حذف إيصال التحويل؟')) return;
    payment.receipt = '';
    payment.receiptName = '';
    if(payment.status === 'بانتظار المراجعة') payment.status = 'غير مدفوعة';
    payment.note = 'تم حذف الإيصال من العميل';
    await persistClient(client);
    showToast('🗑 تم حذف الإيصال');
    renderPanel('payments');
  };

  window.openPayRemainingModal = function(){
    const client = getCurrentClient(); const stats = getPaymentStats(client); const unpaid = payAllUnpaid(stats.payments);
    if(stats.remaining <= 0) return showToast('لا يوجد مبلغ متبقٍ');
    document.getElementById('modalTitle').textContent = 'دفع جميع المبلغ المتبقي';
    document.getElementById('modalContent').innerHTML = `
      <div class="pay-all-card">
        <h3>💰 إجمالي المتبقي: ${stats.remaining.toLocaleString()} ريال</h3>
        <div class="payment-note-muted">الدفعات المشمولة: ${unpaid.map(p => 'الدفعة #' + p.number + ' (' + Number(p.amount || 0).toLocaleString() + ' ريال)').join('، ')}</div>
      </div>
      ${renderBankDetailsCard()}
      <button class="submit-btn green" onclick="clientUploadPayAllReceipt(false)">📎 رفع إيصال تحويل المبلغ المتبقي</button>
      <button class="submit-btn" style="background:#64748b;margin-top:10px;" onclick="closeModal()">رجوع</button>`;
    document.getElementById('modalOverlay').classList.add('active');
  };

  window.clientUploadPayAllReceipt = function(replace){
    const client = getCurrentClient(); const stats = getPaymentStats(client); const unpaid = payAllUnpaid(stats.payments);
    if(!client.id) return showToast('العميل غير موجود');
    if(stats.remaining <= 0) return showToast('لا يوجد مبلغ متبقٍ');
    const input = document.createElement('input'); input.type='file'; input.accept='image/*,application/pdf';
    input.onchange = () => {
      const file = input.files && input.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        client.payAllRequest = {
          amount: stats.remaining,
          includedNumbers: unpaid.map(p => p.number),
          receipt: reader.result,
          receiptName: file.name,
          status: 'بانتظار المراجعة',
          uploadedAt: new Date().toISOString()
        };
        unpaid.forEach(p => {
          p.status = 'بانتظار المراجعة';
          p.receipt = reader.result;
          p.receiptName = file.name;
          p.note = 'إيصال ضمن طلب دفع جميع المتبقي';
        });
        await persistClient(client);
        showToast(replace ? '✅ تم استبدال إيصال جميع المتبقي' : '✅ تم رفع إيصال جميع المتبقي');
        closeModal(); renderPanel('payments');
      };
      reader.readAsDataURL(file);
    };
    input.click();
  };

  window.clientDeletePayAllReceipt = async function(){
    const client = getCurrentClient(); const req = client.payAllRequest;
    if(!req || !req.receipt) return showToast('لا يوجد إيصال');
    if(req.status === 'مدفوعة') return showToast('لا يمكن حذف إيصال معتمد');
    if(!confirm('هل تريد حذف إيصال دفع جميع المتبقي؟')) return;
    const nums = req.includedNumbers || [];
    normalizePayments(client).forEach(p => {
      if(nums.includes(p.number) && p.status !== 'مدفوعة'){
        p.receipt=''; p.receiptName=''; p.status='غير مدفوعة'; p.note='تم حذف إيصال دفع جميع المتبقي';
      }
    });
    client.payAllRequest = null;
    await persistClient(client);
    showToast('🗑 تم حذف إيصال جميع المتبقي');
    renderPanel('payments');
  };

  function renderPayAllAdminBlock(client){
    const req = client.payAllRequest;
    if(!req || !req.receipt) return '';
    return `
      <div class="pay-all-card">
        <div class="section-title">💰 طلب دفع جميع المتبقي</div>
        <div><strong>المبلغ:</strong> ${Number(req.amount || 0).toLocaleString()} ريال</div>
        <div class="payment-note-muted">الدفعات المشمولة: ${(req.includedNumbers || []).map(n => '#'+n).join('، ')}</div>
        <div class="payment-status-line">${paymentStatusBadge(req.status || 'بانتظار المراجعة')} <span class="file-chip">📎 ${psafe(req.receiptName || 'receipt')}</span></div>
        <div class="payment-actions">
          <button class="submit-btn" style="background:#64748b" onclick="openAttachment('${req.receipt}', '${psafe(req.receiptName || 'receipt')}')">👁️ عرض الإيصال</button>
          <button class="submit-btn green" onclick="adminApprovePayAll(${client.id})">✅ اعتماد جميع المتبقي</button>
          <button class="submit-btn red" onclick="adminRejectPayAll(${client.id})">رفض الطلب</button>
          <button class="submit-btn red" style="background:#7f1d1d" onclick="adminDeletePayAllRequest(${client.id})">🗑 حذف الطلب</button>
        </div>
      </div>`;
  }

  const oldAdminOpen = window.adminOpenClientPayments || adminOpenClientPayments;
  window.adminOpenClientPayments = function(id){
    const client = getClientById(id);
    if(!client) return showToast('العميل غير موجود');
    oldAdminOpen(id);
    const app = document.getElementById('appContent');
    if(app && client.payAllRequest && client.payAllRequest.receipt){
      const marker = '<div class="section-title">📑 جدول الدفعات</div>';
      app.innerHTML = app.innerHTML.replace(marker, renderPayAllAdminBlock(client) + marker);
    }
  };
  adminOpenClientPayments = window.adminOpenClientPayments;

  window.adminApprovePayAll = async function(clientId){
    const client = getClientById(clientId); if(!client || !client.payAllRequest) return;
    if(!confirm('هل تريد اعتماد دفع جميع المتبقي وتحويل الدفعات المشمولة إلى مدفوعة؟')) return;
    const req = client.payAllRequest; const nums = req.includedNumbers || [];
    normalizePayments(client).forEach(p => {
      if(nums.includes(p.number)){
        p.status='مدفوعة'; p.paidDate=todayIso();
        p.receipt = p.receipt || req.receipt; p.receiptName = p.receiptName || req.receiptName;
        p.note = 'تم اعتمادها ضمن دفع جميع المتبقي';
      }
    });
    req.status='مدفوعة'; req.approvedAt = new Date().toISOString();
    await persistClient(client);
    showToast('✅ تم اعتماد دفع جميع المتبقي');
    adminOpenClientPayments(clientId);
  };

  window.adminRejectPayAll = async function(clientId){
    const client = getClientById(clientId); if(!client || !client.payAllRequest) return;
    const reason = prompt('سبب رفض إيصال دفع جميع المتبقي:', 'الإيصال غير واضح');
    if(reason === null) return;
    const req = client.payAllRequest; req.status='مرفوض'; req.rejectionReason = reason;
    normalizePayments(client).forEach(p => {
      if((req.includedNumbers || []).includes(p.number) && p.status !== 'مدفوعة'){
        p.status='غير مدفوعة'; p.note = reason || 'تم رفض إيصال دفع جميع المتبقي';
      }
    });
    await persistClient(client);
    showToast('تم رفض طلب دفع جميع المتبقي');
    adminOpenClientPayments(clientId);
  };

  window.adminDeletePayAllRequest = async function(clientId){
    const client = getClientById(clientId); if(!client || !client.payAllRequest) return;
    if(!confirm('هل تريد حذف طلب دفع جميع المتبقي؟')) return;
    const nums = client.payAllRequest.includedNumbers || [];
    normalizePayments(client).forEach(p => {
      if(nums.includes(p.number) && p.status !== 'مدفوعة'){
        p.receipt=''; p.receiptName=''; p.status='غير مدفوعة'; p.note='تم حذف طلب دفع جميع المتبقي من الإدارة';
      }
    });
    client.payAllRequest = null;
    await persistClient(client);
    showToast('🗑 تم حذف الطلب');
    adminOpenClientPayments(clientId);
  };

  console.log('✅ v1.9.1 Payments Pilot Patch loaded');
})();
</script>


<script>
/* ===== v1.9.2 Focused Patch: payments merge + technician client log mobile cleanup ===== */
(function(){
  const PATCH_VERSION = 'v1.9.2-focused';

  function safeEsc(v){
    if (typeof esc === 'function') return esc(v ?? '');
    return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function normalizeStatus(s){
    s = String(s || '').trim();
    if (!s) return 'غير مدفوعة';
    if (s.includes('مدفوعة') && !s.includes('غير')) return 'مدفوعة';
    if (s.includes('مراجعة') || s.includes('انتظار')) return 'بانتظار المراجعة';
    return 'غير مدفوعة';
  }

  function getEditingClient(){
    try {
      const rawId = document.getElementById('newClientId')?.value || '';
      const id = String(rawId).replace('#','').trim();
      return (window.db?.clients || []).find(c => String(c.id) === id) || null;
    } catch(e){ return null; }
  }

  // 1) منع تضارب جدول الدفعات عند تعديل العميل:
  // نولّد الجدول حسب البيانات الجديدة، ثم ندمج حالات الدفعات والإيصالات والفواتير القديمة حسب رقم الدفعة.
  if (typeof generatePaymentScheduleData === 'function' && !window.__v192PaymentPatchApplied) {
    window.__v192PaymentPatchApplied = true;
    const oldGeneratePaymentScheduleData_v192 = generatePaymentScheduleData;

    window.generatePaymentScheduleData = function(){
      const generated = oldGeneratePaymentScheduleData_v192.apply(this, arguments) || [];
      const client = getEditingClient();
      const oldPayments = Array.isArray(client?.payments) ? client.payments : [];

      if (!oldPayments.length) return generated;

      const oldByNumber = {};
      oldPayments.forEach(p => {
        if (p && p.number != null) oldByNumber[String(p.number)] = p;
      });

      return generated.map(p => {
        const old = oldByNumber[String(p.number)];
        if (!old) return p;
        return {
          ...p,
          status: normalizeStatus(old.status),
          paidDate: old.paidDate || '',
          receipt: old.receipt || '',
          receiptName: old.receiptName || '',
          invoice: old.invoice || '',
          invoiceName: old.invoiceName || '',
          note: old.note || '',
          approvedBy: old.approvedBy || '',
          approvedAt: old.approvedAt || '',
          reviewedAt: old.reviewedAt || ''
        };
      });
    };
    generatePaymentScheduleData = window.generatePaymentScheduleData;
  }

  // 2) معاينة جدول الدفعات في شاشة تعديل العميل تعرض الحالة الحقيقية بعد الدمج.

        if (st === 'بانتظار المراجعة') return '<span class="status-badge pending">⏳ بانتظار المراجعة</span>';
        return '<span class="status-badge expired">⚠️ غير مدفوعة</span>';

          if(w > maxWidth){ h = Math.round(h * maxWidth / w); w = maxWidth; }

    return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function today(){ return new Date().toISOString().split('T')[0]; }

    return !!(v && (v.reportId || v.report || v.completed || v.doneAt || ['منفذة','مكتمل','تم التنفيذ','تمت المراجعة','منجز'].some(x => s.includes(x))));

<script>

(function(){

  const dateOnly=(value)=>{ if(!value) return ''; const d=new Date(value); if(Number.isNaN(d.getTime())) return String(value).split('T')[0]; return d.toISOString().split('T')[0]; };

  window.formatSAR = sar;

  window.getContractValue=function(client){ return num(client?.contractAmount ?? client?.value ?? client?.contractValue ?? client?.amount ?? 0); };

  window.normalizePayments=function(client){
    if(!client) return [];
    let payments = Array.isArray(client.payments) ? client.payments : [];
    if(!payments.length && Array.isArray(client.manualPayments) && client.manualPayments.length){
      payments = client.manualPayments.map((p,idx)=>({number:idx+1, amount:num(p.amount), dueDate:p.date||'', status:p.status||'مدفوعة', paidDate:p.date||'', receipt:p.receipt||'', receiptName:p.receiptName||'', invoice:p.invoice||'', invoiceName:p.invoiceName||'', note:p.note||'دفعة يدوية'}));
      client.payments = payments;
    }
    return payments;
  };
  if(typeof normalizePayments!=='undefined') normalizePayments=window.normalizePayments;

  window.getPaymentStats=function(client){

    const paidCount = payments.filter(p=>String(p.status||'').trim()==='مدفوعة').length;

    const reps=(db.reports||[]).filter(r=>String(r.clientId)===String(currentClientId)).sort((a,b)=>(num(a.visitNumber||999)-num(b.visitNumber||999))||String(a.date||'').localeCompare(String(b.date||'')));
    return `<div class="section-title">📄 تقاريري الدورية</div><button class="submit-btn" style="margin-bottom:12px" onclick="exportCurrentViewPDF&&exportCurrentViewPDF('تقارير العميل')">⬇️ تصدير PDF</button>${reps.length?reps.map(r=>{const n=r.visitNumber||((c.visitSchedule||[]).findIndex(v=>reportForVisit(c,v,(c.visitSchedule||[]).indexOf(v))&&String(reportForVisit(c,v,(c.visitSchedule||[]).indexOf(v)).id)===String(r.id))+1)||'-'; const total=(c.visitSchedule||[]).length||c.visits||'-'; return `<div class="report-card" onclick="openReportDetails(${Number(r.id)})"><div class="report-icon">📄</div><div class="report-info"><div class="report-title">تقرير الزيارة رقم ${safe(n)} من ${safe(total)} — ${safe(r.type||'زيارة')}</div><div class="report-date">الفني: ${safe(r.tech||r.employeeName||'-')} | ${safe(r.actualExecutionDate||r.date||'')}</div></div><span class="visit-badge done">${safe(r.status||'مكتمل')}</span><span class="report-arrow">›</span></div>`;}).join(''):'<div class="card">لا توجد تقارير مرفوعة حتى الآن</div>'}`;
  };
  if(typeof clientReports!=='undefined') clientReports=window.clientReports;

  const oldClientMap = window.clientMap || (typeof clientMap==='function'?clientMap:null);
  window.clientMap=function(){

<script>
/* ===== v1.9.8 finance + next visit sync hotfix ===== */
(function(){
  function moneyNumber(v){
    if(v===null || v===undefined || v==='') return 0;
    if(typeof v === 'number') return Number.isFinite(v) ? v : 0;
    let s = String(v)
      .replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d))
      .replace(/[۰-۹]/g, d => '۰۱۲۳۴۵۶۷۸۹'.indexOf(d))
      .replace(/[^0-9.\-]/g,'');
    const n = parseFloat(s);
    return Number.isFinite(n) ? n : 0;
  }
  function statusText(p){ return String((p&&p.status) || (p&&p.paymentStatus) || '').trim(); }
  function isPaidPayment(p){
    const s = statusText(p);
    return s === 'مدفوعة' || s === 'مدفوع' || s === 'paid' || p?.approved === true || p?.isPaid === true || p?.paid === true;
  }
  function isPendingPayment(p){
    const s = statusText(p);
    if(isPaidPayment(p)) return false;
    return s === 'بانتظار المراجعة' || s === 'قيد المراجعة' || s === 'pending' || !!(p && (p.receipt || p.receiptName || p.receiptData));
  }
  function contractValue(c){
    return moneyNumber(c?.contractAmount ?? c?.contractValue ?? c?.value ?? c?.amount ?? c?.total ?? 0);
  }
  function normalizePaymentsSafe(c){
    if(!c) return [];
    let arr = [];
    if(Array.isArray(c.payments)) arr = arr.concat(c.payments);
    if(Array.isArray(c.manualPayments)) arr = arr.concat(c.manualPayments);
    if(Array.isArray(c.paymentSchedule)) arr = arr.concat(c.paymentSchedule);
    return arr;
  }
  window.getPaymentStats_v198 = function(c){
    const total = contractValue(c);
    const payments = normalizePaymentsSafe(c);
    const paid = payments.filter(isPaidPayment).reduce((s,p)=>s+moneyNumber(p.amount ?? p.value ?? p.total),0);
    const pendingReview = payments.filter(isPendingPayment).reduce((s,p)=>s+moneyNumber(p.amount ?? p.value ?? p.total),0);
    const remaining = Math.max(total - paid - pendingReview, 0);
    const overdueCount = payments.filter(p=>!isPaidPayment(p) && !isPendingPayment(p) && (p.dueDate || p.date) && new Date(p.dueDate || p.date) < new Date()).length;
    return {payments, contractValue:total, paid, pendingReview, remaining, overdueCount, percent: total ? Math.min(100,Math.round((paid/total)*100)) : 0};
  };
  window.formatSAR_v198 = function(n){ return `${moneyNumber(n).toLocaleString('en-US',{maximumFractionDigits:2})} ريال`; };

  function dateOnlyVal(v){
    if(!v) return '';
    const d = new Date(v);
    if(!Number.isNaN(d.getTime())) return d.toISOString().slice(0,10);
    return String(v).slice(0,10);
  }
  function today(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
  function completedStatusText(s){
    s=String(s||'');
    return s.includes('مكتمل') || s.includes('تم التنفيذ') || s.includes('منفذة') || s.includes('ملغاة') || s.includes('تم التنفيذ بدون تقرير');
  }
  function reportForVisitSafe(c,v,idx){
    const reports=(window.db?.reports||[]).filter(r=>String(r.clientId)===String(c.id));
    if(v?.reportId){ const r=reports.find(x=>String(x.id)===String(v.reportId)); if(r) return r; }
    const byNo=reports.find(r=>Number(r.visitNumber)===idx+1);
    if(byNo) return byNo;
    const vd=dateOnlyVal(v?.date);
    return reports.find(r=>dateOnlyVal(r.visitDate || r.scheduledDate || r.defaultVisitDate || r.date)===vd) || null;
  }
  window.getNextVisitForClient_v198 = function(c){
    const schedule = Array.isArray(c?.visitSchedule) ? c.visitSchedule : [];
    if(!schedule.length) return null;
    const rows=schedule.map((v,i)=>{
      const rep=reportForVisitSafe(c,v,i);
      const done=!!rep || completedStatusText(v.status);
      const d=new Date(v.date); if(!Number.isNaN(d.getTime())) d.setHours(0,0,0,0);
      return {visit:v,index:i,report:rep,done,dateObj:d,valid:!Number.isNaN(d.getTime())};
    }).filter(x=>!x.done);
    if(!rows.length) return null;
    const future=rows.filter(x=>x.valid && x.dateObj>=today()).sort((a,b)=>a.dateObj-b.dateObj);
    if(future.length) return future[0];
    return rows.filter(x=>x.valid).sort((a,b)=>b.dateObj-a.dateObj)[0] || rows[0];
  };

  const oldGetClientData = window.getClientData || (typeof getClientData === 'function' ? getClientData : null);
  window.getClientData = function(key){
    const c=(window.db?.clients||[]).find(x=>String(x.id)===String(window.currentClientId)) || {};
    if(key === 'nextVisit'){
      const n=window.getNextVisitForClient_v198(c);
      return n ? dateOnlyVal(n.visit.date) : 'لا يوجد';
    }
    if(key === 'nextVisitNumber'){
      const n=window.getNextVisitForClient_v198(c);
      return n ? (n.index+1) : '-';
    }
    if(key === 'nextVisitTotal'){
      return (c.visitSchedule||[]).length || c.visits || '-';
    }
    if(key === 'nextVisitType'){
      const n=window.getNextVisitForClient_v198(c);
      return n ? (n.visit.type || 'زيارة دورية') : '-';
    }
    return oldGetClientData ? oldGetClientData(key) : '—';
  };
  try{ if(typeof getClientData !== 'undefined') getClientData = window.getClientData; }catch(e){}

  const oldClientHome = window.clientHome || (typeof clientHome === 'function' ? clientHome : null);
  window.clientHome = function(){
    const html = oldClientHome ? oldClientHome.apply(this, arguments) : '';
    const c=(window.db?.clients||[]).find(x=>String(x.id)===String(window.currentClientId)) || {};
    const n=window.getNextVisitForClient_v198(c);
    const date=n ? dateOnlyVal(n.visit.date) : 'لا يوجد موعد مجدول';
    const no=n ? `${n.index+1} من ${(c.visitSchedule||[]).length || c.visits || '-'}` : '-';
    const type=n ? (n.visit.type || 'زيارة دورية') : '-';
    return html
      .replace('سيتم إشعارك بموعد الزيارة القادمة', `موعد الزيارة القادمة: ${date}`)
      .replace('الساعة 10:00 صباحاً', `الزيارة رقم ${no}`)
      .replace('سيتم تحديد الفني', type);
  };
  try{ if(typeof clientHome !== 'undefined') clientHome = window.clientHome; }catch(e){}

  window.adminHome = function(){
    const clients=(window.db?.clients||[]);
    const activeClients = clients.filter(c => !String(c.status||'').includes('محذوف'));
    const total=clients.length;
    const active=clients.filter(c=>c.status==='active').length;
    const pending=clients.filter(c=>c.status==='pending').length;
    const expired=clients.filter(c=>c.status==='expired').length;
    const monthly=clients.filter(c=>c.pay==='شهري').length;
    const quarterly=clients.filter(c=>c.pay==='ربع سنوي').length;
    const biannual=clients.filter(c=>c.pay==='نصف سنوي').length;
    const annual=clients.filter(c=>c.pay==='سنوي').length;
    const stats=activeClients.map(window.getPaymentStats_v198);
    const totalRevenue=stats.reduce((s,x)=>s+x.contractValue,0);
    const collectedTotal=stats.reduce((s,x)=>s+x.paid,0);
    const pendingReviewTotal=stats.reduce((s,x)=>s+x.pendingReview,0);
    const remainingTotal=stats.reduce((s,x)=>s+x.remaining,0);
    const overduePaymentsCount=stats.reduce((s,x)=>s+x.overdueCount,0);
    return `
    <div class="welcome-header"><h2>لوحة التحكم 📊</h2><p>نظرة عامة شاملة على أداء المؤسسة</p></div>
    <div class="section-title">💰 مؤشرات التحصيل</div>
    <div class="stats-row cols-4">

   وإعادة حساب المؤشرات من العملاء والدفعات مباشرة بدون الاعتماد على قيم محفوظة.
*/
(function(){
  function getDB(){
    try { if (typeof db !== 'undefined' && db) return db; } catch(e) {}
    return window.db || {clients:[], reports:[]};
  }
  function toNum(v){
    if(v === null || v === undefined || v === '') return 0;
    if(typeof v === 'number') return Number.isFinite(v) ? v : 0;
    const ar = '٠١٢٣٤٥٦٧٨٩';
    const s = String(v)
      .replace(/[٠-٩]/g, d => String(ar.indexOf(d)))
      .replace(/,/g, '')
      .replace(/\s/g, '')
      .replace(/[^0-9.\-]/g, '');
    const n = Number(s);
    return Number.isFinite(n) ? n : 0;
  }
  function sar(v){ return toNum(v).toLocaleString('en-US', {maximumFractionDigits:2}) + ' ريال'; }
  function norm(s){ return String(s || '').trim().toLowerCase(); }
  function isDeletedClient(c){
    const st = norm(c && c.status);
    return !!(c && (c.deleted || c.isDeleted || st.includes('محذوف') || st === 'deleted'));
  }
  function isExpiredClient(c){
    const st = norm(c && c.status);
    if(st === 'expired' || st.includes('منتهي')) return true;
    const end = c && (c.end || c.contractEndDate || c.endDate);
    if(end){
      const d = new Date(end); const t = new Date();
      if(!Number.isNaN(d.getTime())){ d.setHours(0,0,0,0); t.setHours(0,0,0,0); return d < t; }
    }
    return false;
  }
  function isPendingClient(c){
    const st = norm(c && c.status);
    return st === 'pending' || st.includes('قريب') || st.includes('قريبا');
  }
  function contractValue(c){
    // قيمة العقد فقط. لا نستخدم حقول الدفعات حتى لا تتضخم الأرقام.

    return d < t;
  }
  function clientPaymentStats(c){
    const total = contractValue(c);

    const remaining = Math.max(total - paid, 0);
    const overdueCount = payments.filter(isOverduePayment).length;
    return {contractValue: total, paid, remaining, overdueCount, payments};
  }

  window.formatSAR_v1910 = sar;
  window.getPaymentStats_v1910 = clientPaymentStats;

    const stats = clients.map(clientPaymentStats);

(function(){
  function getDB(){
    try { if (typeof db !== 'undefined' && db) return db; } catch(e) {}
    if (window.db && typeof window.db === 'object') return window.db;
    return {clients:[], reports:[], users:[]};
  }
  function exposeDB(){
    try { if (typeof db !== 'undefined' && db) window.db = db; } catch(e) {}
  }
  function toNum(v){
    if(v===null || v===undefined || v==='') return 0;
    if(typeof v === 'number') return Number.isFinite(v) ? v : 0;
    let s = String(v)
      .replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d))
      .replace(/[۰-۹]/g, d => '۰۱۲۳۴۵۶۷۸۹'.indexOf(d))
      .replace(/,/g, '')
      .replace(/\s/g, '')
      .replace(/[^0-9.\-]/g, '');
    const n = parseFloat(s);

  }
  function sar(n){ return `${toNum(n).toLocaleString('en-US',{maximumFractionDigits:2})} ريال`; }

  }
  function contractValue(client){
    // مهم: لا نقرأ amount أو total لأنها قد تكون حقول دفعات وتسبب تضخيم إجمالي العقود.
    const a = toNum(client && client.contractAmount);

    const v = toNum(client && client.value);
    return v > 0 ? v : 0;
  }
  function normalizeManualPayments(client){
    return (Array.isArray(client.manualPayments) ? client.manualPayments : []).map((p, idx) => ({

  function isPaid(p){

<script>

(function(){
  const N = (v)=>{
    if(v===null||v===undefined||v==='') return 0;
    if(typeof v==='number') return Number.isFinite(v)?v:0;
    const s=String(v).replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)).replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).replace(/,/g,'').replace(/[^0-9.\-]/g,'');
    const n=parseFloat(s); return Number.isFinite(n)?n:0;
  };
  const E=(v)=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  const SAR=(v)=>N(v).toLocaleString('en-US',{maximumFractionDigits:2})+' ريال';
  const DB=()=>{ try{ if(typeof db!=='undefined'&&db) return db; }catch(e){} return window.db||{clients:[],reports:[]}; };
  const currentClient=()=>{
    const d=DB();
    let id=null; try{id=typeof currentClientId!=='undefined'?currentClientId:window.currentClientId;}catch(e){}
    return (Array.isArray(d.clients)?d.clients:[]).find(c=>String(c.id)===String(id))||{};
  };
  const status=(p)=>String(p?.status||p?.paymentStatus||'').trim().toLowerCase();
  const isPaid=(p)=>['مدفوعة','مدفوع','paid'].includes(status(p));
  const isPending=(p)=>['بانتظار المراجعة','قيد المراجعة','pending'].includes(status(p));
  const isCancelled=(p)=>status(p).includes('ملغ')||status(p).includes('cancel');
  function payments(c){
    const src=Array.isArray(c?.payments)?c.payments:[];
    const seen=new Set();
    return src.map((p,i)=>({...(p||{}),number:p?.number??i+1,amount:N(p?.amount??p?.value??0)})).filter(p=>{
      const key=String(p.number)+'|'+String(p.dueDate||p.date||'')+'|'+String(p.amount);
      if(seen.has(key)) return false; seen.add(key); return true;
    });
  }
  function contract(c){ return N(c?.contractAmount)>0?N(c.contractAmount):N(c?.value); }
  function stats(c){
    const ps=payments(c); const total=contract(c);
    const paid=ps.filter(isPaid).reduce((a,p)=>a+N(p.amount),0);
    const remaining=Math.max(total-paid,0);
    const today=new Date(); today.setHours(0,0,0,0);
    const overdueCount=ps.filter(p=>{ if(isPaid(p)||isPending(p)||isCancelled(p)) return false; const d=new Date(p.dueDate||p.date||''); if(Number.isNaN(d.getTime())) return false; d.setHours(0,0,0,0); return d<today; }).length;
    return {payments:ps,contractValue:total,paid,remaining,pendingReview:ps.filter(isPending).reduce((a,p)=>a+N(p.amount),0),overdueCount,percent:total?Math.min(100,Math.round(paid/total*100)):0};
  }
  window.getPaymentStats=stats;
  window.normalizePayments=payments;
  window.getContractValue=contract;
  window.formatSAR=SAR;
  try{if(typeof getPaymentStats!=='undefined') getPaymentStats=stats;}catch(e){}
  try{if(typeof normalizePayments!=='undefined') normalizePayments=payments;}catch(e){}

  window.paymentSummaryCard=function(c){ const s=stats(c||{}); return `<div class="card"><div class="section-title">💳 ملخص التحصيل</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center"><div><small>قيمة العقد</small><div style="font-weight:800">${SAR(s.contractValue)}</div></div><div><small>المحصّل</small><div style="font-weight:800;color:var(--green)">${SAR(s.paid)}</div></div><div><small>المتبقي</small><div style="font-weight:800;color:${s.remaining?'var(--red)':'var(--green)'}">${SAR(s.remaining)}</div></div></div><div class="progress-wrap" style="margin-top:12px"><div class="progress-bar" style="width:${s.percent}%"></div></div><div style="text-align:center;font-size:12px;color:var(--text-light)">نسبة التحصيل ${s.percent}%</div></div>`; };

  window.clientHome=function(){
    const c=currentClient(), d=DB(); const s=stats(c);
    const reps=(Array.isArray(d.reports)?d.reports:[]).filter(r=>String(r.clientId)===String(c.id));

    return `<div class="welcome-header"><h2>أهلاً بك 👋</h2><p>${E(c.name||'عميلنا العزيز')}</p><span class="contract-badge">عقد #${E(c.id||'-')}</span></div>${window.paymentSummaryCard(c)}<div class="stats-row cols-3"><div class="stat-card"><span class="stat-icon">📅</span><span class="stat-num green">${rem}</span><span class="stat-label">زيارات متبقية</span></div><div class="stat-card"><span class="stat-icon">✅</span><span class="stat-num">${used}</span><span class="stat-label">زيارات منفذة</span></div><div class="stat-card"><span class="stat-icon">📋</span><span class="stat-num">${reps.length}</span><span class="stat-label">تقارير</span></div></div><div class="action-grid"><div class="action-btn" onclick="renderPanel('reports')"><span class="btn-icon">📋</span><span class="btn-label">تقاريري</span></div><div class="action-btn" onclick="renderPanel('map')"><span class="btn-icon">🗺️</span><span class="btn-label">المصائد</span></div><div class="action-btn" onclick="renderPanel('payments')"><span class="btn-icon">💳</span><span class="btn-label">الدفع</span></div></div>`;
  };

    return `${window.paymentSummaryCard(c)}<div class="section-title">💳 دفعاتي</div>${typeof renderBankDetailsCard==='function'?renderBankDetailsCard():''}<div class="section-title">📑 جدول الدفعات</div>${rows}`;
  };
  try{if(typeof clientPayments!=='undefined') clientPayments=window.clientPayments;}catch(e){}

  const previousGetPanel=window.getPanelHTML;
  window.getPanelHTML=function(id){
    try{

      if(id==='payments'&&role==='client') return window.clientPayments();
      return previousGetPanel?previousGetPanel(id):'<div class="card">الشاشة غير متوفرة</div>';
    }catch(err){ return `<div class="card" style="border:1px solid #fecaca;background:#fff1f2"><h3>⚠️ تعذر فتح الشاشة</h3><pre style="direction:ltr;text-align:left;white-space:pre-wrap">${E(err?.message||err)}</pre></div>`; }
  };
  try{if(typeof getPanelHTML!=='undefined') getPanelHTML=window.getPanelHTML;}catch(e){}

  // لوحة المدير مع كشف مصدر الرقم لكل عميل للمراجعة
  window.adminFinanceAudit=function(){ const cs=(Array.isArray(DB().clients)?DB().clients:[]).filter(c=>c&&!c.deleted&&!c.isDeleted); return cs.map(c=>{const s=stats(c);return `<tr><td>${E(c.name||'-')}</td><td>${SAR(s.contractValue)}</td><td>${SAR(s.paid)}</td><td>${SAR(s.remaining)}</td><td>${s.payments.filter(isPaid).length}</td></tr>`}).join(''); };
  const oldAdmin=window.adminHome;
  window.adminHome=function(){
    const base=oldAdmin?oldAdmin():'';
    return base+`<details class="card" style="margin-top:14px"><summary style="cursor:pointer;font-weight:700">🔎 تدقيق الحساب المالي حسب العميل</summary><div style="overflow:auto;margin-top:12px"><table class="data-table"><thead><tr><th>العميل</th><th>قيمة العقد</th><th>المحصّل</th><th>المتبقي</th><th>دفعات مدفوعة</th></tr></thead><tbody>${window.adminFinanceAudit()}</tbody></table></div></details>`;
  };
  try{if(typeof adminHome!=='undefined') adminHome=window.adminHome;}catch(e){}

  });
  if(typeof window.html2canvas !== 'function'){
    throw new Error('html2canvas غير متاحة بعد إعادة المحاولة');
  }
  return window.html2canvas;
}

async function ensureJsPDF(){
  if(window.jspdf&&window.jspdf.jsPDF)return window.jspdf.jsPDF;
  await new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js';
    s.async=true;
    s.onload=resolve;
    s.onerror=()=>reject(new Error('تعذر تحميل مكتبة jsPDF'));
    document.head.appendChild(s);
  });
  if(!(window.jspdf&&window.jspdf.jsPDF))throw new Error('jsPDF غير متاحة بعد إعادة المحاولة');
  return window.jspdf.jsPDF;
}
async function savePages(pages,filename){
  await ensureHtml2Canvas();
  const JsPDF=await ensureJsPDF();
  const mask=document.createElement('div');mask.className='pdf-busy-mask';mask.innerHTML='جاري إنشاء التقرير PDF...<br>لا تغلق الصفحة';
  const stage=document.createElement('div');stage.style.cssText='position:fixed;top:0;left:0;width:794px;height:1123px;z-index:2147483646;background:#fff;overflow:hidden;';
  document.body.append(stage,mask);
  try{
    const pdf=new JsPDF({orientation:'portrait',unit:'mm',format:'a4',compress:true});
    for(let i=0;i<pages.length;i++){
      if(i>0)pdf.addPage('a4','portrait');
      mask.innerHTML=`جاري إنشاء التقرير PDF...<br>الصفحة ${i+1} من ${pages.length}`;
      const canvas=await renderPage(pages[i],stage);
      const data=canvas.toDataURL('image/jpeg',0.9);
      pdf.addImage(data,'JPEG',0,0,210,297,undefined,'FAST');
      canvas.width=1;canvas.height=1;
    }
    pdf.save(filename);
  } finally { stage.remove(); mask.remove(); pages.forEach(p=>p.remove()); }
}
window.downloadReportPDF=async function(id){
  const r=(db.reports||[]).find(x=>String(x.id)===String(id));
  if(!r)return showToast('التقرير غير موجود');
  const c=(db.clients||[]).find(x=>String(x.id)===String(r.clientId))||{};
  const sections=reportSections(r);
  const rows=[
    ['اسم العميل',r.client||c.name],['رقم العقد',c.contractNo||c.contractNumber||r.clientId],
    ['رقم الزيارة',r.visitNumber||r.number],['الفني',r.tech||r.employeeName],
    ['نوع الزيارة',r.type],['التاريخ المجدول',r.scheduledDate||r.date],
    ['تاريخ التنفيذ الفعلي',r.actualExecutionDate||r.executionDate||r.date],
    ['المواد المستخدمة',r.materials],['الملاحظات',r.notes||r.recommendations],
    ['الآفات المرصودة',Array.isArray(r.pests)?r.pests.join('، '):r.pests],['الحالة',r.status||'مكتمل']
  ];
  const first=makePage(`${header('تقرير زيارة فنية',`${r.client||c.name||''}`)}${infoRows(rows)}<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:28px"><div style="height:110px;border:1px solid #94a3b8;border-radius:8px;padding:12px"><b>اسم وتوقيع ممثل العميل:</b></div><div style="height:110px;border:1px solid #94a3b8;border-radius:8px;padding:12px"><b>اسم وتوقيع الفني:</b></div></div><div style="position:absolute;bottom:18px;right:28px;left:28px;text-align:center;color:#64748b;font-size:10px">تم إنشاء التقرير من بوابة المتعاقدين — خطوة محترف</div>`);
  let pages=[first];
  [['صور التنفيذ',sections.executionImages],['صور الآفات المرصودة',sections.pestImages],['صور التقرير الورقي',sections.paperReportImages],['خريطة الطعوم والمصائد',sections.baitMapImages],['محطات ومصائد القوارض',sections.rodentStationImages]].forEach(([t,a])=>pages.push(...createImagePages(t,a)));
  try{
    await savePages(pages,`تقرير_${fileSafe(r.client||c.name||'عميل')}_زيارة_${fileSafe(r.visitNumber||r.number||'')}.pdf`);
    showToast('✅ تم تحميل التقرير PDF');
  }catch(e){console.error('REPORT_PDF_ERROR',e);showToast(`❌ تعذر إنشاء التقرير: ${e.message||'خطأ غير معروف'}`)}
};
try{downloadReportPDF=window.downloadReportPDF}catch(e){}
})();
</script>

<style>
.ops-toolbar{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:10px;align-items:end}.ops-board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.ops-col{background:#eef3f8;border:1px solid var(--border);border-radius:14px;padding:10px;min-height:180px}.ops-col h3{font-size:13px;color:var(--primary);margin-bottom:10px}.ops-task{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:9px;box-shadow:0 2px 8px rgba(0,0,0,.04)}.ops-task-title{font-weight:800;font-size:14px}.ops-meta{font-size:11px;color:var(--text-light);line-height:1.8;margin-top:5px}.ops-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.ops-actions button{width:auto!important;padding:6px 9px!important;font-size:11px!important}.ops-status{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}.ops-scheduled{background:#e3f2fd;color:#1565c0}.ops-en_route{background:#fff3e0;color:#e65100}.ops-in_progress{background:#fff8e1;color:#8d6e00}.ops-completed{background:#e8f5e9;color:#2e7d32}.ops-missed{background:#fce4ec;color:#c62828}@media(max-width:800px){.ops-toolbar{grid-template-columns:1fr 1fr}.ops-board{grid-template-columns:1fr}.ops-toolbar .wide{grid-column:1/-1}}
</style>
<script>
(function(){
'use strict';
window.opsTasks=[];
const OPS_PATH='fieldOperations';
const OPS_STATUS={scheduled:'مجدولة',en_route:'في الطريق',in_progress:'بدأ العمل',completed:'مكتملة',missed:'لم تُنفذ'};
function opsEsc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function opsNow(){return new Date().toISOString();}
function opsDate(v){if(!v)return '—';try{return new Date(v).toLocaleString('ar-SA')}catch(e){return v}}
function opsIsAdmin(){return currentRole==='admin';}
function opsAssigneeMatch(t){const u=currentUser||{};return [t.assigneeUid,t.assigneeEmail,t.assigneeName].some(x=>x&&[u.uid,u.email,u.name].includes(x));}
window.loadOperations=async function(){
  if(!window.firebaseDB)return [];
  const snap=await window.firebaseDB.ref(OPS_PATH).get();
  const rows=snap.exists()?Object.entries(snap.val()||{}).map(([key,v])=>({key,...v})):[];
  window.opsTasks=rows.sort((a,b)=>String(a.scheduledAt||'').localeCompare(String(b.scheduledAt||'')));
  return window.opsTasks;
};
async function opsSave(task){
  const ref=task.key?window.firebaseDB.ref(`${OPS_PATH}/${task.key}`):window.firebaseDB.ref(OPS_PATH).push();
  const payload={...task,key:undefined,updatedAt:opsNow(),updatedBy:currentUser?.name||currentUser?.email||'مستخدم'};
  if(!task.key){payload.createdAt=opsNow();payload.createdBy=currentUser?.name||currentUser?.email||'مدير';}
  await ref.update(payload); return ref.key;
}
window.operationsPanel=function(){
  return `<div class="section-title">🧭 ${opsIsAdmin()?'إدارة التشغيل الميداني':'مهامي الميدانية'}</div><div id="opsRoot"><div class="card">⏳ جاري تحميل المهام...</div></div>`;
};
window.initOperationsPanel=async function(){try{await loadOperations();renderOperations()}catch(e){console.error(e);document.getElementById('opsRoot').innerHTML='<div class="card">⚠️ تعذر تحميل مهام التشغيل.</div>'}};
window.renderOperations=function(){
  const root=document.getElementById('opsRoot'); if(!root)return;
  const all=opsIsAdmin()?window.opsTasks:window.opsTasks.filter(opsAssigneeMatch);
  const city=document.getElementById('opsCityFilter')?.value||'';const tech=document.getElementById('opsTechFilter')?.value||'';const day=document.getElementById('opsDayFilter')?.value||'';const q=(document.getElementById('opsSearch')?.value||'').trim().toLowerCase();
  const rows=all.filter(t=>(!city||t.city===city)&&(!tech||t.assigneeUid===tech)&&(!day||String(t.scheduledAt||'').slice(0,10)===day)&&(!q||JSON.stringify(t).toLowerCase().includes(q)));
  const users=(window.systemUsersCache||[]).filter(u=>['employee','supervisor'].includes(u.role)&&u.active!==false);
  root.innerHTML=`${opsIsAdmin()?`<div class="card ops-toolbar"><div class="wide"><label class="form-label">بحث</label><input id="opsSearch" class="form-input" placeholder="اسم العميل أو الموقع" oninput="renderOperations()"></div><div><label class="form-label">اليوم</label><input id="opsDayFilter" type="date" class="form-input" onchange="renderOperations()"></div><div><label class="form-label">المدينة</label><select id="opsCityFilter" class="form-select" onchange="renderOperations()"><option value="">الكل</option>${['جدة','مكة','الرياض'].map(x=>`<option>${x}</option>`).join('')}</select></div><div><label class="form-label">الفني</label><select id="opsTechFilter" class="form-select" onchange="renderOperations()"><option value="">الكل</option>${users.map(u=>`<option value="${opsEsc(u.uid)}">${opsEsc(u.name||u.email)}</option>`).join('')}</select></div><button class="submit-btn green" onclick="openOpsTaskModal()">+ مهمة جديدة</button></div>`:''}<div class="stats-row cols-4"><div class="stat-card"><span class="stat-num">${rows.length}</span><span class="stat-label">إجمالي المهام</span></div><div class="stat-card"><span class="stat-num orange">${rows.filter(x=>x.status==='scheduled').length}</span><span class="stat-label">مجدولة</span></div><div class="stat-card"><span class="stat-num gold">${rows.filter(x=>['en_route','in_progress'].includes(x.status)).length}</span><span class="stat-label">قيد التنفيذ</span></div><div class="stat-card"><span class="stat-num green">${rows.filter(x=>x.status==='completed').length}</span><span class="stat-label">مكتملة</span></div></div><div class="ops-board">${['scheduled','en_route','in_progress','completed'].map(st=>`<div class="ops-col"><h3>${OPS_STATUS[st]} (${rows.filter(x=>x.status===st).length})</h3>${rows.filter(x=>x.status===st).map(opsTaskCard).join('')||'<div style="font-size:12px;color:#94a3b8">لا توجد مهام</div>'}</div>`).join('')}</div>`;
};
function opsTaskCard(t){
 const next={scheduled:'en_route',en_route:'in_progress',in_progress:'completed'}[t.status];
 return `<div class="ops-task"><div style="display:flex;justify-content:space-between;gap:8px"><div class="ops-task-title">${opsEsc(t.clientName||'عميل')}</div><span class="ops-status ops-${opsEsc(t.status||'scheduled')}">${OPS_STATUS[t.status]||t.status}</span></div><div class="ops-meta">📍 ${opsEsc(t.city||'—')} — ${opsEsc(t.location||'—')}<br>🕒 ${opsDate(t.scheduledAt)}<br>👷 ${opsEsc(t.assigneeName||'غير مسند')}<br>🧰 ${opsEsc(t.serviceType||'زيارة دورية')}</div>${t.notes?`<div class="ops-meta">📝 ${opsEsc(t.notes)}</div>`:''}<div class="ops-actions">${next?`<button class="submit-btn green" onclick="advanceOpsTask('${opsEsc(t.key)}','${next}')">${next==='en_route'?'🚗 في الطريق':next==='in_progress'?'▶️ بدء العمل':'✅ إنهاء'}</button>`:''}${opsIsAdmin()?`<button class="submit-btn" onclick="openOpsTaskModal('${opsEsc(t.key)}')">تعديل</button><button class="submit-btn red" onclick="deleteOpsTask('${opsEsc(t.key)}')">حذف</button>`:''}${!opsIsAdmin()&&t.status==='completed'?`<button class="submit-btn" onclick="openReportForTask('${opsEsc(t.key)}')">📤 رفع تقرير</button>`:''}</div></div>`;
}
window.openOpsTaskModal=function(key){
 const t=window.opsTasks.find(x=>x.key===key)||{};const users=(window.systemUsersCache||[]).filter(u=>['employee','supervisor'].includes(u.role)&&u.active!==false);
 const clients=db.clients||[];
 openModal('opsTask');setTimeout(()=>{const box=document.querySelector('#modalContent,#modalBody,.modal-content,.modal-box');if(!box)return;box.innerHTML=`<div class="modal-header"><div class="modal-title">${key?'تعديل المهمة':'مهمة ميدانية جديدة'}</div><button class="modal-close" onclick="closeModal()">×</button></div><input type="hidden" id="opsKey" value="${opsEsc(key||'')}"><div class="form-group"><label class="form-label">العميل *</label><select id="opsClient" class="form-select">${clients.map(c=>`<option value="${opsEsc(c.id)}" ${String(c.id)===String(t.clientId)?'selected':''}>${opsEsc(c.name)}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">نوع الخدمة</label><input id="opsService" class="form-input" value="${opsEsc(t.serviceType||'زيارة دورية')}"></div><div class="form-group"><label class="form-label">موعد الزيارة *</label><input id="opsWhen" type="datetime-local" class="form-input" value="${opsEsc((t.scheduledAt||'').slice(0,16))}"></div><div class="form-group"><label class="form-label">المدينة</label><select id="opsCity" class="form-select">${['جدة','مكة','الرياض'].map(x=>`<option ${t.city===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">الموقع</label><input id="opsLocation" class="form-input" value="${opsEsc(t.location||'')}"></div><div class="form-group"><label class="form-label">إسناد إلى</label><select id="opsAssignee" class="form-select"><option value="">غير مسند</option>${users.map(u=>`<option value="${opsEsc(u.uid)}" ${u.uid===t.assigneeUid?'selected':''}>${opsEsc(u.name||u.email)}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">ملاحظات</label><textarea id="opsNotes" class="form-textarea">${opsEsc(t.notes||'')}</textarea></div><button class="submit-btn green" onclick="saveOpsTaskForm()">💾 حفظ المهمة</button>`},50);
};
window.saveOpsTaskForm=async function(){
 const key=document.getElementById('opsKey').value;const clientId=document.getElementById('opsClient').value;const c=(db.clients||[]).find(x=>String(x.id)===String(clientId))||{};const uid=document.getElementById('opsAssignee').value;const u=(window.systemUsersCache||[]).find(x=>x.uid===uid)||{};
 const old=window.opsTasks.find(x=>x.key===key)||{};const task={...old,key,clientId,clientName:c.name||'عميل',serviceType:document.getElementById('opsService').value,scheduledAt:document.getElementById('opsWhen').value,city:document.getElementById('opsCity').value,location:document.getElementById('opsLocation').value,assigneeUid:uid,assigneeName:u.name||'',assigneeEmail:u.email||'',notes:document.getElementById('opsNotes').value,status:old.status||'scheduled'};
 if(!task.clientId||!task.scheduledAt)return showToast('⚠️ أكمل العميل والموعد');await opsSave(task);await window.writeAuditLog?.('operation_saved',`${key?'تعديل':'إنشاء'} مهمة للعميل ${task.clientName}`,{taskKey:key||'new'});closeModal();showToast('✅ تم حفظ المهمة');await loadOperations();renderOperations();
};
window.advanceOpsTask=async function(key,status){const t=window.opsTasks.find(x=>x.key===key);if(!t)return;const patch={status};if(status==='en_route')patch.enRouteAt=opsNow();if(status==='in_progress')patch.startedAt=opsNow();if(status==='completed')patch.completedAt=opsNow();await window.firebaseDB.ref(`${OPS_PATH}/${key}`).update(patch);await window.writeAuditLog?.('operation_status',`${t.clientName}: ${OPS_STATUS[status]}`,{taskKey:key,status});await loadOperations();renderOperations();};
window.deleteOpsTask=async function(key){if(!confirm('حذف المهمة نهائياً؟'))return;await window.firebaseDB.ref(`${OPS_PATH}/${key}`).remove();await loadOperations();renderOperations();showToast('تم حذف المهمة');};
window.openReportForTask=function(key){const t=window.opsTasks.find(x=>x.key===key);window.currentOpsTask=t||null;renderPanel('report_upload');setTimeout(()=>{const s=document.getElementById('reportClientSelect');if(s&&t)s.value=t.clientId;const type=document.getElementById('serviceType');if(type&&t)type.value=t.serviceType||'زيارة دورية';},80)};
const oldInit=window.initPanelJS||initPanelJS;window.initPanelJS=function(id){try{oldInit(id)}catch(e){console.warn(e)}if(id==='operations')initOperationsPanel();};try{initPanelJS=window.initPanelJS}catch(e){}
const oldEmployeeHome=employeeHome;window.employeeHome=employeeHome=function(){const mine=(window.opsTasks||[]).filter(opsAssigneeMatch);const today=new Date().toISOString().slice(0,10);return `<div class="welcome-header"><h2>أهلاً، ${opsEsc(currentUser?.name||'الفني')} 👷</h2><p>تابع مهامك الميدانية من مكان واحد</p></div><div class="stats-row cols-3"><div class="stat-card"><span class="stat-num orange">${mine.filter(x=>String(x.scheduledAt||'').slice(0,10)===today).length}</span><span class="stat-label">زيارات اليوم</span></div><div class="stat-card"><span class="stat-num gold">${mine.filter(x=>['en_route','in_progress'].includes(x.status)).length}</span><span class="stat-label">قيد التنفيذ</span></div><div class="stat-card"><span class="stat-num green">${mine.filter(x=>x.status==='completed').length}</span><span class="stat-label">مكتملة</span></div></div><button class="submit-btn green" onclick="renderPanel('operations')">🧭 فتح مهامي</button>`};
window.employeeVisits=employeeVisits=function(){return operationsPanel()};
})();
</script>
