  const oldGetPanel = window.getPanelHTML || (typeof getPanelHTML==='function'?getPanelHTML:null);
  window.getPanelHTML=function(id){
    if(currentRole==='employee' && id==='reports') return window.employeeReports();
    if(currentRole==='admin' && id==='all_reports') return window.adminAllReports();
    return oldGetPanel ? oldGetPanel.apply(this,arguments) : '<p>الصفحة غير موجودة</p>';
  };
  if(typeof getPanelHTML!=='undefined') getPanelHTML=window.getPanelHTML;
  if(window.navs && Array.isArray(window.navs.employee)){
    window.navs.employee = [
      {id:'home',icon:'🏠',label:'الرئيسية'},
      {id:'visits',icon:'📅',label:'الزيارات'},
      {id:'report_upload',icon:'📤',label:'رفع تقرير'},
      {id:'reports',icon:'📋',label:'تقاريري'}
    ];
  } else if(typeof navs!=='undefined' && Array.isArray(navs.employee)){
    navs.employee = [
      {id:'home',icon:'🏠',label:'الرئيسية'},
      {id:'visits',icon:'📅',label:'الزيارات'},
      {id:'report_upload',icon:'📤',label:'رفع تقرير'},
      {id:'reports',icon:'📋',label:'تقاريري'}
    ];
  }

  window.openReportEdit_v196=function(id){
    const r=reports().find(x=>String(x.id)===String(id)); if(!r) return showToast('التقرير غير موجود'); if(!canEmployeeEdit(r)) return showToast('لا تملك صلاحية تعديل هذا التقرير');
    document.getElementById('appContent').innerHTML=`<div class="section-title">✏️ تعديل التقرير</div><div class="card"><div class="form-group"><label class="form-label">نوع الزيارة</label><input class="form-input" id="editReportType" value="${e(r.type||'')}"></div><div class="form-group"><label class="form-label">المواد المستخدمة</label><input class="form-input" id="editReportMaterials" value="${e(r.materials||'')}"></div><div class="form-group"><label class="form-label">الملاحظات</label><textarea class="form-textarea" id="editReportNotes">${e(r.notes||'')}</textarea></div><button class="submit-btn green" onclick="saveReportEdit_v196(${Number(r.id)})">💾 حفظ التعديلات</button><button class="submit-btn" style="background:#64748b;margin-top:10px" onclick="openReportDetails(${Number(r.id)})">رجوع</button></div>`;
  };
  window.saveReportEdit_v196=async function(id){
    const r=reports().find(x=>String(x.id)===String(id)); if(!r) return;
    r.type=document.getElementById('editReportType')?.value||r.type;
    r.materials=document.getElementById('editReportMaterials')?.value||'';
    r.notes=document.getElementById('editReportNotes')?.value||'';
    r.lastEditedBy=currentUser?.name||currentUser?.username||'مستخدم'; r.lastEditedAt=new Date().toISOString();
    if(typeof saveDB==='function') saveDB();
    try{ if(window.firebase&&firebase.database) await firebase.database().ref('reports/'+id).update({type:r.type,materials:r.materials,notes:r.notes,lastEditedBy:r.lastEditedBy,lastEditedAt:r.lastEditedAt}); }catch(e){}
    showToast('✅ تم حفظ التعديلات'); openReportDetails(id);
  };
  const oldOpen = window.openReportDetails || (typeof openReportDetails==='function'?openReportDetails:null);
  window.openReportDetails=function(id){
    if(oldOpen) oldOpen.apply(this,arguments);
    const r=reports().find(x=>String(x.id)===String(id));
    if(!r) return;
    const box=document.getElementById('appContent');
    if(box && canEmployeeEdit(r)){
      const btn=`<button class="submit-btn green" style="margin-top:10px" onclick="openReportEdit_v196(${Number(r.id)})">✏️ تعديل التقرير</button>`;
      box.innerHTML=box.innerHTML.replace('<button class="submit-btn" style="margin-top:10px;background:#64748b;" onclick="renderPanel(currentPanel)">رجوع</button>', btn+'<button class="submit-btn" style="margin-top:10px;background:#64748b;" onclick="renderPanel(currentPanel)">رجوع</button>');
    }
  };
  if(typeof openReportDetails!=='undefined') openReportDetails=window.openReportDetails;
})();
</script>



<script>
/* ===== v1.9.7 Safe Fixes: finance + visits + reports stability ===== */
(function(){
  const safe = (v)=>String(v ?? '').replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  const num = (v)=>{
    if(v===null || v===undefined || v==='') return 0;
    if(typeof v === 'number') return Number.isFinite(v)?v:0;
    const s=String(v).replace(/,/g,'').replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)).replace(/[^0-9.\-]/g,'');
    const n=Number(s); return Number.isFinite(n)?n:0;
  };
  const sar = (v)=>`${num(v).toLocaleString('en-US',{maximumFractionDigits:2})} ريال`;
  const dateOnly=(value)=>{ if(!value) return ''; const d=new Date(value); if(Number.isNaN(d.getTime())) return String(value).split('T')[0]; return d.toISOString().split('T')[0]; };
  const todayOnly=()=>{ const d=new Date(); d.setHours(0,0,0,0); return d; };
  const completedStatus=(s)=>['مكتمل','منفذة','تم التنفيذ','تمت المراجعة','تم التنفيذ بدون تقرير','completed','done'].includes(String(s||'').trim());
  window.formatSAR = sar;

  window.getContractValue=function(client){ return num(client?.contractAmount ?? client?.value ?? client?.contractValue ?? client?.amount ?? 0); };

  window.normalizePayments=function(client){
    if(!client) return [];
    let payments = Array.isArray(client.payments) ? client.payments : [];
    if(!payments.length && Array.isArray(client.manualPayments) && client.manualPayments.length){
      payments = client.manualPayments.map((p,idx)=>({number:idx+1, amount:num(p.amount), dueDate:p.date||'', status:p.status||'مدفوعة', paidDate:p.date||'', receipt:p.receipt||'', receiptName:p.receiptName||'', invoice:p.invoice||'', invoiceName:p.invoiceName||'', note:p.note||'دفعة يدوية'}));
      client.payments = payments;
    }
    return payments;
  };
  if(typeof normalizePayments!=='undefined') normalizePayments=window.normalizePayments;

  window.getPaymentStats=function(client){
    const payments = window.normalizePayments(client);
    const contractValue = window.getContractValue(client);
    const paid = payments.filter(p=>String(p.status||'').trim()==='مدفوعة').reduce((s,p)=>s+num(p.amount),0);
    const pendingReview = payments.filter(p=>String(p.status||'').trim()==='بانتظار المراجعة').reduce((s,p)=>s+num(p.amount),0);
    const remaining = Math.max(contractValue - paid - pendingReview, 0);
    const unpaidCount = payments.filter(p=>String(p.status||'').trim()!=='مدفوعة').length;
    const paidCount = payments.filter(p=>String(p.status||'').trim()==='مدفوعة').length;
    const percent = contractValue ? Math.min(100, Math.round((paid / contractValue) * 100)) : 0;
    return {payments, contractValue, paid, pendingReview, remaining, unpaidCount, paidCount, percent};
  };
  if(typeof getPaymentStats!=='undefined') getPaymentStats=window.getPaymentStats;

  function reportForVisit(client, visit, index){
    const reps=(db.reports||[]).filter(r=>String(r.clientId)===String(client.id));
    return reps.find(r=>String(r.id)===String(visit.reportId||''))
      || reps.find(r=>String(r.visitId||'')===String(visit.id||''))
      || reps.find(r=>String(r.visitIndex)!=='' && Number(r.visitIndex)===index)
      || reps.find(r=>String(r.visitNumber||'')===String(visit.number||index+1))
      || reps.find(r=>dateOnly(r.scheduledDate||r.defaultVisitDate||r.visitDate)===dateOnly(visit.date));
  }
  window.getReportForVisit_v197 = reportForVisit;

  window.getAllVisitsNormalized=function(){
    const today=todayOnly();
    return (db.clients||[]).flatMap(client => (client.visitSchedule||[]).map((v,index)=>{
      const d=new Date(v.date); if(!Number.isNaN(d.getTime())) d.setHours(0,0,0,0);
      const rep=reportForVisit(client,v,index);
      const completed=completedStatus(v.status) || !!v.doneAt || !!v.reportId || !!rep;
      return {clientId:client.id, client:client.name||'—', contractNo:client.contractNo||client.contractNumber||client.id, visitIndex:index, number:v.number||index+1, total:(client.visitSchedule||[]).length || num(client.visits), tech:v.tech||'غير محدد', date:v.date||'', type:v.type||'زيارة دورية', status: completed ? (v.status||'مكتمل') : (v.status||'مجدولة'), completed, overdue:!completed && !Number.isNaN(d.getTime()) && d<today, report:rep, raw:v};
    }));
  };
  window.getOverdueVisits=()=>window.getAllVisitsNormalized().filter(v=>v.overdue);

  window.adminHome=function(){
    const clients=db.clients||[];
    const total=clients.length;
    const active=clients.filter(c=>(c.status||'active')==='active').length;
    const pending=clients.filter(c=>c.status==='pending').length;
    const expired=clients.filter(c=>c.status==='expired').length;
    const monthly=clients.filter(c=>(c.pay||c.paymentPlan)==='شهري').length;
    const quarterly=clients.filter(c=>(c.pay||c.paymentPlan)==='ربع سنوي').length;
    const biannual=clients.filter(c=>(c.pay||c.paymentPlan)==='نصف سنوي').length;
    const annual=clients.filter(c=>(c.pay||c.paymentPlan)==='سنوي').length;
    const stats=clients.map(c=>window.getPaymentStats(c));
    const contractTotal=stats.reduce((s,x)=>s+x.contractValue,0);
    const collectedTotal=stats.reduce((s,x)=>s+x.paid,0);
    const pendingReviewTotal=stats.reduce((s,x)=>s+x.pendingReview,0);
    const remainingTotal=stats.reduce((s,x)=>s+x.remaining,0);
    const overduePaymentsCount=clients.reduce((count,c)=>count+window.normalizePayments(c).filter(p=>String(p.status||'')!=='مدفوعة' && p.dueDate && new Date(p.dueDate)<new Date()).length,0);
    return `<div class="welcome-header"><h2>لوحة التحكم 📊</h2><p>نظرة عامة شاملة على أداء المؤسسة</p></div>
    <div class="section-title">💰 مؤشرات التحصيل</div><div class="stats-row cols-4">
      <div class="stat-card" style="border-top:3px solid var(--green);"><span class="stat-icon">✅</span><span class="stat-num green">${sar(collectedTotal)}</span><span class="stat-label">المحصّل</span></div>
      <div class="stat-card" style="border-top:3px solid var(--gold);"><span class="stat-icon">⏳</span><span class="stat-num gold">${sar(pendingReviewTotal)}</span><span class="stat-label">بانتظار المراجعة</span></div>
      <div class="stat-card" style="border-top:3px solid var(--red);"><span class="stat-icon">💸</span><span class="stat-num red">${sar(remainingTotal)}</span><span class="stat-label">المتبقي</span></div>
      <div class="stat-card" style="border-top:3px solid var(--orange);"><span class="stat-icon">⚠️</span><span class="stat-num orange">${overduePaymentsCount}</span><span class="stat-label">دفعات متأخرة</span></div></div>
    <div class="section-title">📋 إحصائيات العقود</div><div class="stats-row cols-4">
      <div class="stat-card" style="border-top:3px solid var(--green);"><span class="stat-icon">📋</span><span class="stat-num green">${total}</span><span class="stat-label">إجمالي العقود</span></div>
      <div class="stat-card" style="border-top:3px solid var(--green-light);"><span class="stat-icon">✅</span><span class="stat-num green">${active}</span><span class="stat-label">عقود نشطة</span></div>
      <div class="stat-card" style="border-top:3px solid var(--gold);"><span class="stat-icon">⏳</span><span class="stat-num gold">${pending}</span><span class="stat-label">تنتهي قريباً</span></div>
      <div class="stat-card" style="border-top:3px solid var(--red);"><span class="stat-icon">❌</span><span class="stat-num red">${expired}</span><span class="stat-label">عقود منتهية</span></div></div>
    <div class="section-title">💰 إحصائيات مالية</div><div class="stats-row cols-3">
      <div class="stat-card" style="border-top:3px solid var(--primary);"><span class="stat-icon">💰</span><span class="stat-num gold">${sar(contractTotal)}</span><span class="stat-label">إجمالي قيمة العقود</span></div>
      <div class="stat-card" style="border-top:3px solid var(--green);"><span class="stat-icon">👥</span><span class="stat-num green">${total}</span><span class="stat-label">إجمالي العملاء</span></div>
      <div class="stat-card" style="border-top:3px solid var(--orange);"><span class="stat-icon">📅</span><span class="stat-num orange">${window.getAllVisitsNormalized().filter(v=>dateOnly(v.date)===dateOnly(new Date())).length}</span><span class="stat-label">زيارات اليوم</span></div></div>
    <div class="section-title">🔄 توزيع طرق الدفع</div><div class="stats-row cols-4">
      <div class="stat-card"><span class="stat-icon">📅</span><span class="stat-num">${monthly}</span><span class="stat-label">شهري</span></div><div class="stat-card"><span class="stat-icon">📅</span><span class="stat-num green">${quarterly}</span><span class="stat-label">ربع سنوي</span></div><div class="stat-card"><span class="stat-icon">📅</span><span class="stat-num gold">${biannual}</span><span class="stat-label">نصف سنوي</span></div><div class="stat-card"><span class="stat-icon">📅</span><span class="stat-num orange">${annual}</span><span class="stat-label">سنوي</span></div></div>`;
  };
  if(typeof adminHome!=='undefined') adminHome=window.adminHome;

  window.adminVisits=function(){
    const all=window.getAllVisitsNormalized().sort((a,b)=>new Date(a.date)-new Date(b.date));
    const t=todayOnly(); const tomorrow=new Date(t); tomorrow.setDate(t.getDate()+1); const end=new Date(t); end.setDate(t.getDate()+7);
    const isSame=(a,b)=>dateOnly(a)===dateOnly(b);
    const todayCount=all.filter(v=>isSame(v.date,t)).length;
    const tomorrowCount=all.filter(v=>isSame(v.date,tomorrow)).length;
    const week=all.filter(v=>{const d=new Date(v.date); return !Number.isNaN(d)&&d>=t&&d<=end;});
    const overdue=all.filter(v=>v.overdue);
    return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><div class="section-title" style="margin:0;">📅 جدول الزيارات</div><button class="submit-btn" style="width:auto;padding:8px 16px;font-size:13px;" onclick="openModal('scheduleVisit')">+ جدولة زيارة</button></div>
    <div class="stats-row cols-4" style="margin-bottom:20px;"><div class="stat-card" onclick="showVisitList('today')" style="cursor:pointer;"><span class="stat-icon">📍</span><span class="stat-num green">${todayCount}</span><span class="stat-label">زيارات اليوم</span></div><div class="stat-card" onclick="showVisitList('tomorrow')" style="cursor:pointer;"><span class="stat-icon">➡️</span><span class="stat-num">${tomorrowCount}</span><span class="stat-label">زيارات الغد</span></div><div class="stat-card" onclick="showVisitList('week')" style="cursor:pointer;"><span class="stat-icon">🗓️</span><span class="stat-num gold">${week.length}</span><span class="stat-label">هذا الأسبوع</span></div><div class="stat-card" onclick="showVisitList('overdue')" style="cursor:pointer;"><span class="stat-icon">⚠️</span><span class="stat-num red">${overdue.length}</span><span class="stat-label">متأخرة</span></div></div>
    ${week.map(v=>visitRow(v)).join('') || '<div class="card">لا توجد زيارات قادمة هذا الأسبوع.</div>'}`;
  };
  if(typeof adminVisits!=='undefined') adminVisits=window.adminVisits;

  function visitRow(v){
    return `<div class="visit-item"><div class="visit-dot ${v.overdue?'danger':v.completed?'done':'upcoming'}">📅</div><div class="visit-info" onclick="openVisitDetails(${Number(v.clientId)}, ${Number(v.visitIndex)})" style="cursor:pointer;"><div class="visit-title">${safe(v.client)} — الزيارة رقم ${safe(v.number)} من ${safe(v.total||'-')}</div><div class="visit-date">${safe(v.date)} — ${safe(v.type)} | الفني: ${safe(v.tech)}</div></div><span class="visit-badge ${v.completed?'done':v.overdue?'pending':'upcoming'}">${safe(v.completed?'مكتملة':v.overdue?'متأخرة':v.status)}</span></div>`;
  }

  window.showVisitList=function(type){
    let title='الزيارات'; const t=todayOnly(); const tomorrow=new Date(t); tomorrow.setDate(t.getDate()+1); const end=new Date(t); end.setDate(t.getDate()+7);
    let visits=window.getAllVisitsNormalized().filter(v=>{const d=new Date(v.date); if(Number.isNaN(d.getTime())) return false; d.setHours(0,0,0,0); if(type==='today'){title='زيارات اليوم'; return d.getTime()===t.getTime();} if(type==='tomorrow'){title='زيارات الغد'; return d.getTime()===tomorrow.getTime();} if(type==='week'){title='زيارات هذا الأسبوع'; return d>=t&&d<=end;} if(type==='overdue'){title='الزيارات المتأخرة'; return v.overdue;} return true;}).sort((a,b)=>new Date(a.date)-new Date(b.date));
    document.getElementById('appContent').innerHTML=`<div class="section-title">📅 ${title} (${visits.length})</div>${visits.length?visits.map(visitRow).join(''):'<div class="card" style="text-align:center;padding:24px;">لا توجد زيارات في هذا القسم.</div>'}<button class="submit-btn" style="margin-top:16px;background:#64748b;" onclick="renderPanel('all_visits')">رجوع لجدول الزيارات</button>`;
  };

  window.openVisitDetails=function(clientId, visitIndex){
    const c=(db.clients||[]).find(x=>String(x.id)===String(clientId)); if(!c) return showToast('لم يتم العثور على العميل');
    const v=(c.visitSchedule||[])[Number(visitIndex)] || (c.visitSchedule||[]).find(x=>x.date===visitIndex); if(!v) return showToast('لم يتم العثور على الزيارة');
    const idx=(c.visitSchedule||[]).indexOf(v); const normalized=window.getAllVisitsNormalized().find(x=>String(x.clientId)===String(c.id)&&Number(x.visitIndex)===idx) || {number:idx+1,total:(c.visitSchedule||[]).length};
    const rep=reportForVisit(c,v,idx);
    document.getElementById('appContent').innerHTML=`<div class="section-title">📅 تفاصيل الزيارة</div><div class="card"><h3>${safe(c.name)} — الزيارة رقم ${safe(normalized.number)} من ${safe(normalized.total)}</h3><div style="margin-top:10px;line-height:2"><div><b>التاريخ:</b> ${safe(v.date||'-')}</div><div><b>النوع:</b> ${safe(v.type||'زيارة دورية')}</div><div><b>الفني:</b> ${safe(v.tech||'غير محدد')}</div><div><b>الحالة:</b> ${safe(normalized.completed?'مكتملة':normalized.overdue?'متأخرة':(v.status||'مجدولة'))}</div><div><b>التقرير:</b> ${rep?`مرفوع ✅`:'لم يرفع بعد ⏳'}</div></div><div class="visit-admin-actions" style="margin-top:14px;"><button class="submit-btn green" onclick="changeVisitStatus_v197(${Number(c.id)},${idx})">تغيير حالة الزيارة</button><button class="submit-btn" onclick="editVisitDate_v197(${Number(c.id)},${idx})">تعديل موعد الزيارة</button>${rep?`<button class="submit-btn" onclick="openReportDetails(${Number(rep.id)})">عرض التقرير</button>`:''}</div></div><button class="submit-btn" style="background:#64748b;margin-top:12px;" onclick="renderPanel('all_visits')">رجوع لجدول الزيارات</button>`;
  };

  window.changeVisitStatus_v197=async function(clientId,idx){
    const c=(db.clients||[]).find(x=>String(x.id)===String(clientId)); if(!c||!c.visitSchedule||!c.visitSchedule[idx]) return;
    const val=prompt('اكتب الحالة الجديدة: مجدولة / مؤجلة / ملغاة / تم التنفيذ بدون تقرير / مكتمل', c.visitSchedule[idx].status||'مجدولة');
    if(!val) return; c.visitSchedule[idx].status=val.trim(); if(completedStatus(val)) c.visitSchedule[idx].doneAt=new Date().toISOString();
    if(typeof saveDB==='function') saveDB(); try{ if(window.saveClientToFirebase) await window.saveClientToFirebase(c); }catch(e){}
    showToast('✅ تم تحديث حالة الزيارة'); openVisitDetails(clientId,idx);
  };
  window.editVisitDate_v197=async function(clientId,idx){
    const c=(db.clients||[]).find(x=>String(x.id)===String(clientId)); if(!c||!c.visitSchedule||!c.visitSchedule[idx]) return;
    const val=prompt('أدخل موعد الزيارة الجديد بصيغة YYYY-MM-DD', dateOnly(c.visitSchedule[idx].date)); if(!val) return;
    c.visitSchedule[idx].date=val.trim(); if(typeof saveDB==='function') saveDB(); try{ if(window.saveClientToFirebase) await window.saveClientToFirebase(c); }catch(e){}
    showToast('✅ تم تعديل موعد الزيارة'); openVisitDetails(clientId,idx);
  };

  window.clientReports=function(){

<script>

      .replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d))
      .replace(/[۰-۹]/g, d => '۰۱۲۳۴۵۶۷۸۹'.indexOf(d))
      .replace(/[^0-9.\-]/g,'');
    const n = parseFloat(s);
    return Number.isFinite(n) ? n : 0;
  }
  function statusText(p){ return String((p&&p.status) || (p&&p.paymentStatus) || '').trim(); }
  function isPaidPayment(p){
    const s = statusText(p);
    return s === 'مدفوعة' || s === 'مدفوع' || s === 'paid' || p?.approved === true || p?.isPaid === true || p?.paid === true;
  }
  function isPendingPayment(p){
    const s = statusText(p);
    if(isPaidPayment(p)) return false;
    return s === 'بانتظار المراجعة' || s === 'قيد المراجعة' || s === 'pending' || !!(p && (p.receipt || p.receiptName || p.receiptData));
  }
  function contractValue(c){
    return moneyNumber(c?.contractAmount ?? c?.contractValue ?? c?.value ?? c?.amount ?? c?.total ?? 0);
  }

    if(!c) return [];

    if(Array.isArray(c.payments)) arr = arr.concat(c.payments);

<script>

(function(){
  function getDB(){
    try { if (typeof db !== 'undefined' && db) return db; } catch(e) {}
    return window.db || {clients:[], reports:[]};
  }
  function toNum(v){
    if(v === null || v === undefined || v === '') return 0;
    if(typeof v === 'number') return Number.isFinite(v) ? v : 0;
    const ar = '٠١٢٣٤٥٦٧٨٩';
    const s = String(v)
      .replace(/[٠-٩]/g, d => String(ar.indexOf(d)))
      .replace(/,/g, '')
      .replace(/\s/g, '')
      .replace(/[^0-9.\-]/g, '');
    const n = Number(s);
    return Number.isFinite(n) ? n : 0;
  }
  function sar(v){ return toNum(v).toLocaleString('en-US', {maximumFractionDigits:2}) + ' ريال'; }
  function norm(s){ return String(s || '').trim().toLowerCase(); }
  function isDeletedClient(c){
    const st = norm(c && c.status);
    return !!(c && (c.deleted || c.isDeleted || st.includes('محذوف') || st === 'deleted'));
  }
  function isExpiredClient(c){
    const st = norm(c && c.status);
    if(st === 'expired' || st.includes('منتهي')) return true;
    const end = c && (c.end || c.contractEndDate || c.endDate);
    if(end){
      const d = new Date(end); const t = new Date();
      if(!Number.isNaN(d.getTime())){ d.setHours(0,0,0,0); t.setHours(0,0,0,0); return d < t; }
    }
    return false;
  }
  function isPendingClient(c){
    const st = norm(c && c.status);
    return st === 'pending' || st.includes('قريب') || st.includes('قريبا');
  }
  function contractValue(c){
    // قيمة العقد فقط. لا نستخدم حقول الدفعات حتى لا تتضخم الأرقام.
    return toNum(c && (c.contractAmount ?? c.contractValue ?? c.value ?? c.totalContract ?? c.contractTotal ?? 0));
  }
  function paymentsOf(c){
    if(!c) return [];
    if(Array.isArray(c.payments) && c.payments.length) return c.payments;
    if(Array.isArray(c.manualPayments) && c.manualPayments.length) return c.manualPayments;

  function statusOf(p){ return String((p && (p.status || p.paymentStatus || p.state)) || '').trim(); }

    if(st === 'مدفوعة' || st === 'مدفوع' || /^paid$/i.test(st)) return true;
    if(p && (p.paid === true || p.isPaid === true || p.approved === true || p.statusPaid === true)) return true;

  }
  function payAmount(p){ return toNum(p && (p.amount ?? p.value ?? p.total ?? p.paymentAmount ?? 0)); }
  function isOverduePayment(p){
    if(isPaid(p)) return false;
    const st = statusOf(p);

        return d.getTime() === today.getTime();

      </div>

      <div class="section-title">📋 إحصائيات العقود</div>
      <div class="stats-row cols-4">

        <div class="stat-card" style="border-top:3px solid var(--gold);"><span class="stat-icon">⏳</span><span class="stat-num gold">${pending}</span><span class="stat-label">تنتهي قريباً</span></div>
        <div class="stat-card" style="border-top:3px solid var(--red);"><span class="stat-icon">❌</span><span class="stat-num red">${expired}</span><span class="stat-label">عقود منتهية</span></div>
      </div>

      <div class="section-title">💰 إحصائيات مالية</div>
      <div class="stats-row cols-3">
        <div class="stat-card" style="border-top:3px solid var(--primary);"><span class="stat-icon">💰</span><span class="stat-num gold">${sar(contractTotal)}</span><span class="stat-label">إجمالي قيمة العقود</span></div>
        <div class="stat-card" style="border-top:3px solid var(--green);"><span class="stat-icon">👥</span><span class="stat-num green">${total}</span><span class="stat-label">إجمالي العملاء</span></div>
        <div class="stat-card" style="border-top:3px solid var(--orange);"><span class="stat-icon">📅</span><span class="stat-num orange">${visitsToday}</span><span class="stat-label">زيارات اليوم</span></div>
      </div>

      <div class="section-title">🔄 توزيع طرق الدفع</div>
      <div class="stats-row cols-4">
        <div class="stat-card"><span class="stat-icon">📆</span><span class="stat-num" style="color:var(--primary);">${monthly}</span><span class="stat-label">شهري</span></div>
        <div class="stat-card"><span class="stat-icon">📅</span><span class="stat-num green">${quarterly}</span><span class="stat-label">ربع سنوي</span></div>
        <div class="stat-card"><span class="stat-icon">🗓️</span><span class="stat-num gold">${biannual}</span><span class="stat-label">نصف سنوي</span></div>
        <div class="stat-card"><span class="stat-icon">📋</span><span class="stat-num orange">${annual}</span><span class="stat-label">سنوي</span></div>
      </div>

      ${total === 0 ? `<div class="card" style="text-align:center; padding:40px; background:#f8fafc;"><div style="font-size:48px; margin-bottom:12px;">📋</div><div style="font-size:16px; font-weight:700; color:var(--primary); margin-bottom:8px;">لا يوجد عملاء بعد</div><button class="submit-btn" style="width:auto; padding:10px 24px;" onclick="renderPanel('all_clients')">+ إضافة عميل</button></div>` : ``}
    `;
  };

  try { if(typeof adminHome !== 'undefined') adminHome = window.adminHome; } catch(e) {}

  // تحديث لوحة المدير بعد حفظ العميل في Firebase، بدون لمس بقية الشاشات.
  const oldSaveClient = window.saveClientToFirebase;
  if(typeof oldSaveClient === 'function' && !oldSaveClient.__v1910_wrapped){

      return result;

  }
})();

<script>
/* ===== v1.9.11 RESCUE: lazy panels + light local cache + safe dashboard ===== */
(function(){
  function toNum(v){
    if(v===null||v===undefined||v==='') return 0;
    if(typeof v==='number') return Number.isFinite(v)?v:0;
    let s=String(v)
      .replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d))
      .replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d))
      .replace(/[^0-9.\-]/g,'');
    const n=parseFloat(s);
    return Number.isFinite(n)?n:0;
  }
  function sar(n){ return `${toNum(n).toLocaleString('en-US',{maximumFractionDigits:2})} ريال`; }
  function h2(v){
    return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
  }
  function stripHeavy(obj){
    const seen=new WeakSet();
    function walk(x){
      if(x===null||x===undefined) return x;
      if(typeof x==='string'){
        if(x.startsWith('data:image') || x.startsWith('data:application') || x.length>50000) return '';
        return x;
      }
      if(typeof x!=='object') return x;
      if(seen.has(x)) return null; seen.add(x);
      if(Array.isArray(x)) return x.map(walk);
      const out={};
      for(const [k,v] of Object.entries(x)){
        if(/image|photo|receipt|invoice|attachment|base64|dataUrl|fileData/i.test(k)){
          if(typeof v==='string') { out[k]=''; continue; }
        }
        out[k]=walk(v);
      }
      return out;
    }
    return walk(obj);
  }

  window.saveDB=function(){
    try{
      const light=stripHeavy(window.db || db || {});
      localStorage.setItem('khotwah_db', JSON.stringify(light));

      return true;

      window.__lastSaveError=e;

  function paidStatus(p){

  function pendingStatus(p){

    return {payments,contractValue,paid,pendingReview,remaining,overdueCount,percent:contractValue?Math.min(100,Math.round((paid/contractValue)*100)):0};

      if(id==='settings') return adminSettings();
      if(id==='client_emergency') return clientEmergency();
      if(id==='client_complaints') return clientComplaints();
      if(id==='client_ratings') return clientRatings();
      return `<div class="card">الشاشة غير متوفرة: ${h2(id)}</div>`;
    }catch(e){
      console.error('Panel error:', id, e);
      return `<div class="card" style="border:1px solid #fecaca;background:#fff1f2"><h3>⚠️ تعذر فتح هذه الشاشة</h3><p style="font-size:13px;color:#7f1d1d">تم منع ظهور صفحة بيضاء. جرّب تحديث الصفحة أو انتقل لشاشة أخرى.</p><pre style="white-space:pre-wrap;direction:ltr;text-align:left;font-size:11px;background:white;padding:8px;border-radius:8px;overflow:auto">${h2(e.message||e)}</pre></div>`;
    }
  };
  if(typeof getPanelHTML!=='undefined') getPanelHTML=window.getPanelHTML;

  const oldRenderPanel=window.renderPanel || (typeof renderPanel==='function'?renderPanel:null);
  window.renderPanel=function(panelId, btn, skipHistory){
    try{
      if(!skipHistory && window.currentPanel && window.currentPanel!==panelId){ try{ history.pushState({panel:panelId},'', '#'+panelId); }catch(_){ } }
      document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
      if(btn) btn.classList.add('active');
      window.currentPanel=panelId; if(typeof currentPanel!=='undefined') currentPanel=panelId;
      const content=document.getElementById('appContent');
      if(content) content.innerHTML=window.getPanelHTML(panelId);
      if(typeof initPanelJS==='function') initPanelJS(panelId);
    }catch(e){
      console.error('renderPanel rescue error:', e);
      const content=document.getElementById('appContent');
      if(content) content.innerHTML=`<div class="card"><h3>⚠️ خطأ في فتح الشاشة</h3><p>${h2(e.message||e)}</p></div>`;
    }
  };
  if(typeof renderPanel!=='undefined') renderPanel=window.renderPanel;

  // بعد تحميل Firebase حدث الشاشة الحالية مرة واحدة
  setTimeout(function(){
    try{
      if(window.currentRole && document.getElementById('appContent')) window.renderPanel(window.currentPanel||'home', null, true);
    }catch(e){ console.warn(e); }
  },1200);
})();
</script>

</body>
</html>
