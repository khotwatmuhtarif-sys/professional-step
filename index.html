<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  // انتظر تحميل Firebase
  function initFirebase() {
    if (typeof firebase === 'undefined') {
      setTimeout(initFirebase, 100);
      return;
    }

    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyDudd2Y4qfxHJJXpxrDNlnGWPQaBnlKQro",
        authDomain: "stepro-contractors.firebaseapp.com",
        databaseURL: "https://stepro-contractors-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "stepro-contractors",
        storageBucket: "stepro-contractors.firebasestorage.app",
        messagingSenderId: "69302004635",
        appId: "1:69302004635:web:f72bfaeb8e75de2d438f3e"
      });
    }

    const db_fire = firebase.database();

    window.loadClientsFromFirebase = async function() {
      try {
        const snapshot = await db_fire.ref('clients').get();
        if (snapshot.exists()) {
          const data = snapshot.val();
          db.clients = Object.values(data);
          if (db.clients.length > 0) {
            db.nextId = Math.max(...db.clients.map(c => c.id)) + 1;
          }
        }
      } catch(e) {
        console.log('خطأ تحميل:', e);
      }
    };
    window.loadReportsFromFirebase = async function() {
  try {
    const snapshot = await db_fire.ref('reports').get();

    if (snapshot.exists()) {
      const data = snapshot.val();

      db.reports = Object.values(data)
        .sort((a, b) => (b.id || 0) - (a.id || 0));
        
      saveDB();
    }
  } catch(e) {
    console.log('خطأ تحميل التقارير:', e);
  }
};

    window.saveClientToFirebase = async function(client) {
      try {
        await db_fire.ref('clients/' + client.id).set(client);
        console.log('✅ تم حفظ العميل في Firebase:', client.username);
        window.__lastFirebaseSaveError = null;
        return true;
      } catch(e) {
        window.__lastFirebaseSaveError = e;
        console.error('خطأ حفظ Firebase:', e);
        if (typeof showToast === 'function') showToast('⚠️ تعذر الحفظ على السحابة، تحقق من الإنترنت');
        return false;
      }
    };

    window.deleteClientFromFirebase = async function(id) {
      try {
        await db_fire.ref('clients/' + id).remove();
        return true;
      } catch(e) {
        return false;
      }
    };

    window.loginFromFirebase = async function(username, password) {
      try {
        const snapshot = await db_fire.ref('clients').get();
        if (snapshot.exists()) {
          const data = snapshot.val();
          const clients = Object.values(data);
          const found = clients.find(c => c.username === username && c.password === password);
          if (found) {
            db.clients = clients;
            if (clients.length > 0) {
              db.nextId = Math.max(...clients.map(c => c.id)) + 1;
            }
            console.log('✅ تم الدخول:', found.name);
            return found;
          }
        }
        return null;
      } catch(e) {
        console.log('خطأ دخول:', e);
        return null;
      }
    };

    console.log('✅ Firebase جاهز!');
  }

  // ابدأ التهيئة
  initFirebase();
</script>

  direction: rtl;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--primary);
}

.form-textarea { resize: vertical; min-height: 80px; }

.submit-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border: none;
  border-radius: 12px;
  padding: 14px;
  color: white;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(26,58,92,0.25);
}

.submit-btn:hover { transform: translateY(-1px); }
.submit-btn.green { background: linear-gradient(135deg, var(--green), var(--green-light)); }
.submit-btn.red { background: linear-gradient(135deg, var(--red), #ef5350); }

/* PAYMENT STATUS */
.payment-card {
  border-radius: var(--radius-sm);
  padding: 20px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.payment-card.paid { background: #e8f5e9; border: 1px solid #a5d6a7; }
.payment-card.unpaid { background: #fce4ec; border: 1px solid #f48fb1; }

.payment-icon { font-size: 36px; }
.payment-info { flex: 1; }
.payment-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.payment-date { font-size: 12px; color: var(--text-light); }
.payment-amount { font-size: 20px; font-weight: 900; }
.payment-card.paid .payment-amount { color: var(--green); }
.payment-card.unpaid .payment-amount { color: var(--red); }

/* NOTIFICATION DOT */
.notif-dot {
  width: 8px; height: 8px;
  background: var(--red);
  border-radius: 50%;
  position: absolute;
  top: 2px; left: 2px;
}

/* ADMIN TABLE */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.data-table th {
  background: var(--primary);
  color: white;
  padding: 10px 14px;
  text-align: right;
  font-weight: 600;
}

.data-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.data-table tr:hover td { background: #f0f4f8; }

.status-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}

.status-badge.active { background: #e8f5e9; color: var(--green); }
.status-badge.pending { background: #fff8e1; color: var(--gold); }
.status-badge.expired { background: #fce4ec; color: var(--red); }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.active { display: flex; }

.modal-box {
  background: white;
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 28px 24px;
  animation: slideUp 0.3s ease;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-title { font-size: 18px; font-weight: 700; color: var(--primary); }
.modal-close {
  background: var(--bg);
  border: none;
  border-radius: 50%;
  width: 32px; height: 32px;
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
}

/* SUCCESS TOAST */
.toast {
  position: fixed;
  top: 80px;
  right: 50%;
  transform: translateX(50%);
  background: var(--green);
  color: white;
  padding: 14px 24px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 8px 32px rgba(46,125,50,0.3);
  z-index: 2000;
  display: none;
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateX(50%) translateY(-20px); }
  to { opacity: 1; transform: translateX(50%) translateY(0); }
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .stats-row.cols-4 { grid-template-columns: repeat(2, 1fr); }
  .action-grid { grid-template-columns: repeat(3, 1fr); }
  .login-box { padding: 36px 24px; }
}

/* EMPLOYEE SPECIFIC */
.client-select-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.client-select-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }

.client-avatar {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-size: 20px;
  flex-shrink: 0;
}

/* PEST IMAGE GRID */
.pest-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 12px 0;
}

.pest-item {
  background: var(--bg);
  border-radius: 10px;
  padding: 14px 8px;
  text-align: center;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-light);
}

.pest-item:hover, .pest-item.selected {
  border-color: var(--primary);
  background: rgba(26,58,92,0.05);
  color: var(--primary);
}

.pest-item .pest-emoji { font-size: 28px; display: block; margin-bottom: 6px; }

/* ===== v1.5 cleanup: delete confirmations + payment cards ===== */
.payment-card{
  display:block !important;
  position:relative;
  overflow:hidden;
}
.payment-card .payment-icon{
  float:left;
  font-size:28px !important;
  opacity:.85;
}
.payment-card .payment-amount{
  display:block;
  margin-top:8px;
  font-size:18px !important;
}
.payment-actions{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:8px;
  margin-top:12px;
}
.payment-actions .submit-btn{
  width:100% !important;
  padding:8px 10px !important;
  font-size:12px !important;
}
.file-chip{
  display:inline-block;
  max-width:100%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  direction:ltr;
  vertical-align:middle;
  background:#f8fafc;
  border:1px solid #e2e8f0;
  border-radius:8px;
  padding:4px 8px;
  margin-top:4px;
  font-size:12px;
}
.admin-mini-actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:8px;
}
.admin-mini-actions .submit-btn{
  width:auto !important;
  padding:6px 10px !important;
  font-size:11px !important;
}
.danger-soft{
  background:#fff1f2 !important;
  border-color:#fecdd3 !important;
}
.report-thumb-wrap{
  position:relative;
  display:inline-block;
}
.report-thumb-wrap img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
  border:1px solid #ddd;
}
.report-thumb-del{
  position:absolute;
  top:4px;
  left:4px;
  border:0;
  border-radius:50%;
  width:26px;
  height:26px;
  background:#e53935;
  color:white;
  cursor:pointer;
  font-weight:bold;
}
.visit-admin-actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:8px;
}
.visit-admin-actions .submit-btn{
  width:auto !important;
  padding:6px 10px !important;
  font-size:11px !important;
}

</style>

// توليد كلمة سر تلقائية
function generatePassword(id) {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let pass = 'K';
  for(let i = 0; i < 5; i++) pass += chars[Math.floor(Math.random() * chars.length)];
  return pass + id;
}

// حفظ البيانات
function saveDB() {
  try {
    localStorage.setItem('khotwah_db', JSON.stringify(db));
    window.__lastSaveError = null;
    return true;
  } catch(e) {
    window.__lastSaveError = e;
    console.error('فشل حفظ البيانات محلياً:', e);
    if (typeof showToast === 'function') showToast('⚠️ تعذر الحفظ محلياً، قد تكون الذاكرة ممتلئة');
    return false;
  }
}

// تحميل البيانات
function loadDB() {
  try {
    const saved = localStorage.getItem('khotwah_db');
    if (saved) db = JSON.parse(saved);
  } catch(e) {
    window.__lastLoadError = e;
    console.error('فشل تحميل البيانات المحلية:', e);
  }
}

let currentUser = null;
let currentClientId = null;

function selectRole(role, btn) {
    currentRole = role;

    document.querySelectorAll('.role-btn').forEach(b => {
        b.classList.remove('selected');
    });

    btn.classList.add('selected');

    
    document.getElementById('loginError').style.display = 'none';
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value.trim();
  const errorEl = document.getElementById('loginError');
  errorEl.style.display = 'none';

  if (!username || !password) {
    errorEl.textContent = '⚠️ أدخل اسم المستخدم وكلمة المرور';
    errorEl.style.color = '#ef5350';
    errorEl.style.display = 'block';
    return;
  }

  // 1. تحقق من الإدارة والفنيين أولاً (محلي)
  const user = db.users.find(u => u.username === username && u.password === password);
  if (user) {
    currentRole = user.role;
    currentUser = user;
    document.getElementById('navUserName').textContent = user.name;
    document.getElementById('navUserRole').textContent = user.role === 'admin' ? 'التحكم بالنظام' : 'فني ميداني';
    document.getElementById('navUserAvatar').textContent = user.role === 'admin' ? '🖥️' : '👷';
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('appScreen').classList.add('active');
    await window.loadClientsFromFirebase();
        await window.loadReportsFromFirebase();
    renderNav();
    renderPanel('home');
    return;
  }

  // 2. تحقق من العملاء في Firebase
  errorEl.textContent = '⏳ جاري التحقق...';
  errorEl.style.color = 'rgba(255,255,255,0.7)';
  errorEl.style.display = 'block';

  const clientUser = await window.loginFromFirebase(username, password);

  if (!clientUser) {
    errorEl.textContent = '⚠️ اسم المستخدم أو كلمة المرور غير صحيحة';
    errorEl.style.color = '#ef5350';
    errorEl.style.display = 'block';
    return;
  }

  // دخول العميل
  currentRole = 'client';
  currentUser = clientUser;
  currentClientId = clientUser.id;
  document.getElementById('navUserName').textContent = clientUser.name;
  document.getElementById('navUserRole').textContent = 'عميل متعاقد';
  document.getElementById('navUserAvatar').textContent = '🏢';
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  renderNav();
  renderPanel('home');
}

function doLogout() {
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
}

function renderNav() {
  const nav = document.getElementById('bottomNav');
  const items = navs[currentRole];
  nav.className = `bottomnav ${currentRole}-nav`;
  nav.innerHTML = items.map(item => `
    <button class="nav-item ${item.id === 'home' ? 'active' : ''}" onclick="renderPanel('${item.id}', this)">
      <span class="nav-icon">${item.icon}</span>
      ${item.label}
    </button>
  `).join('');
}

function renderPanel(panelId, btn, skipHistory = false) {

    if (!skipHistory && currentPanel && currentPanel !== panelId) {
        history.pushState(
    { panel: panelId },
    '',
    '#'+panelId
);
    }

    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));

    if (btn) btn.classList.add('active');

    currentPanel = panelId;

    const content = document.getElementById('appContent');
    content.innerHTML = getPanelHTML(panelId);
    initPanelJS(panelId);
}

    if(event.state && event.state.panel){
        renderPanel(event.state.panel, null, true);

    all_reports: adminAllReports(),

    settings: adminSettings(),
  };

}


// ===== HELPER: CLIENT DATA =====
function getClientData(key) {
  const client = db.clients.find(c => c.id === currentClientId) || {};
  const used = client.used || 0;
  const visits = client.visits || 0;
  const remaining = visits - used;
  const percent = visits > 0 ? Math.round((used/visits)*100) : 0;
  const map = {
    id: client.id || '—',
    name: client.name || '—',
    start: client.start || '-',
    contractStartDate: client.contractStartDate || '-',
    end: client.end || '—',
    nextVisit: (client.visitSchedule || []).find(v => (v.status || '').includes('مجدولة'))?.date || 'لا يوجد',
    used, visits, remaining, percent,
    value: client.value ? client.value.toLocaleString() : '0',
    pay: client.pay || '—'
  };
  return map[key] ?? '—';
}

function normalizePayments(client) {
    if (!client) return [];

    let payments = Array.isArray(client.payments) ? client.payments : [];

    if (!payments.length && Array.isArray(client.manualPayments) && client.manualPayments.length) {
        payments = client.manualPayments.map((p, idx) => ({
            number: idx + 1,
            amount: Number(p.amount || 0),
            dueDate: p.date || '',
            status: p.status || 'مدفوعة',
            paidDate: p.date || '',
            receipt: p.receipt || '',
            receiptName: p.receiptName || '',
            invoice: p.invoice || '',
            invoiceName: p.invoiceName || '',
            note: p.note || 'دفعة يدوية'
        }));
        client.payments = payments;
    }

    return payments;
}

function getContractValue(client) {
    return Number(client?.contractAmount || client?.value || 0);
}

function getPaymentStats(client) {
    const payments = normalizePayments(client);
    const contractValue = getContractValue(client);
    const paid = payments
        .filter(p => p.status === 'مدفوعة')
        .reduce((sum, p) => sum + Number(p.amount || 0), 0);
    const pendingReview = payments
        .filter(p => p.status === 'بانتظار المراجعة')
        .reduce((sum, p) => sum + Number(p.amount || 0), 0);
    const remaining = Math.max(contractValue - paid, 0);
    const unpaidCount = payments.filter(p => p.status !== 'مدفوعة').length;
    const paidCount = payments.filter(p => p.status === 'مدفوعة').length;
    const percent = contractValue ? Math.min(100, Math.round((paid / contractValue) * 100)) : 0;

    return { payments, contractValue, paid, pendingReview, remaining, unpaidCount, paidCount, percent };
}

function paymentStatusBadge(status) {
    if (status === 'مدفوعة') {
        return `<span class="status-badge active">✅ مدفوعة</span>`;

    if (status === 'بانتظار المراجعة') {

    return `<span class="status-badge expired">⚠️ غير مدفوعة</span>`;
}

function clientUploadReceipt(paymentNumber) {
    const client = db.clients.find(c => String(c.id) === String(currentClientId));
    if (!client) return showToast('العميل غير موجود');
    const payment = normalizePayments(client).find(p => Number(p.number) === Number(paymentNumber));
    if (!payment) return showToast('الدفعة غير موجودة');

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*,application/pdf';
    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            payment.receipt = reader.result;
            payment.receiptName = file.name;
            payment.status = 'بانتظار المراجعة';
            payment.note = payment.note || 'تم رفع إيصال من العميل';
            persistClientPayments(client);
            showToast('✅ تم رفع الإيصال وبانتظار اعتماد الإدارة');
            renderPanel('payments');
        };
        reader.readAsDataURL(file);
    };
    fileInput.click();
}

function clientPayAllRemaining() {
    const client = db.clients.find(c => String(c.id) === String(currentClientId));
    if (!client) return;
    const stats = getPaymentStats(client);
    if (!stats.remaining) return showToast('لا يوجد مبلغ متبقٍ');

    if (!confirm('سيتم تسجيل طلب دفع جميع الدفعات المتبقية. هل تريد رفع إيصال التحويل الآن؟')) return;

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*,application/pdf';
    fileInput.onchange = () => {
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            normalizePayments(client).forEach(p => {
                if (p.status !== 'مدفوعة') {
                    p.status = 'بانتظار المراجعة';
                    p.receipt = reader.result;
                    p.receiptName = file.name;
                    p.note = 'طلب سداد جميع المتبقي';
                }
            });
            persistClientPayments(client);
            showToast('✅ تم رفع إيصال دفع جميع المتبقي');
            renderPanel('payments');
        };
        reader.readAsDataURL(file);
    };
    fileInput.click();
}

function compressImage(file, maxWidth = 700, quality = 0.45) {
    return new Promise((resolve, reject) => {
        if (file.size > 15 * 1024 * 1024) {
            reject('الصورة كبيرة جداً: ' + file.name);
            return;
        }

        const reader = new FileReader();

        reader.onload = e => {
            const img = new Image();

            img.onload = () => {
                const canvas = document.createElement('canvas');

                let width = img.width;
                let height = img.height;

                if (width > maxWidth) {
                    height = Math.round((height * maxWidth) / width);
                    width = maxWidth;
                }

                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                resolve(canvas.toDataURL('image/jpeg', quality));
            };

            img.onerror = () => reject('تعذر قراءة الصورة: ' + file.name);
            img.src = e.target.result;
        };

        reader.onerror = () => reject('تعذر تحميل الصورة: ' + file.name);
        reader.readAsDataURL(file);
    });
}

async function readImages(inputId, maxFiles = 3) {
    const images = [];
    const files = Array.from(document.getElementById(inputId)?.files || []);

    if (files.length > maxFiles) {
        throw new Error('الحد الأقصى ' + maxFiles + ' صور لكل قسم');
    }

    for (const file of files) {
        const compressedBase64 = await compressImage(file);
        images.push({
            name: file.name,
            data: compressedBase64
        });
    }

    return images;
}

async function adminMarkPaymentPaid(clientId, paymentNumber) {
    const client = db.clients.find(c => String(c.id) === String(clientId));
    if (!client) return;
    const payment = normalizePayments(client).find(p => Number(p.number) === Number(paymentNumber));
    if (!payment) return;
    if (payment.status === 'مدفوعة' && !confirm('هذه الدفعة معتمدة مسبقاً. هل تريد تحديث بيانات اعتمادها؟')) return;
    const paidDate = prompt('تاريخ الدفع الفعلي:', payment.paidDate || new Date().toISOString().split('T')[0]);
    if (paidDate === null) return;
    const note = prompt('رقم الإيصال أو ملاحظة مختصرة:', payment.note || '');
    payment.status = 'مدفوعة';
    payment.paidDate = paidDate || new Date().toISOString().split('T')[0];
    payment.note = note || payment.note || '';
    await persistClientPayments(client);
    showToast('✅ تم اعتماد الدفعة كمدفوعة');
    adminOpenClientPayments(clientId);
}

async function adminMarkPaymentUnpaid(clientId, paymentNumber) {
    const client = db.clients.find(c => String(c.id) === String(clientId));
    if (!client) return;
    const payment = normalizePayments(client).find(p => Number(p.number) === Number(paymentNumber));

function openAttachment(dataUrl, filename='attachment') {
    if (!dataUrl) return showToast('لا يوجد مرفق محفوظ');
    try {
        const w = window.open('', '_blank');
        if (!w) return showToast('اسمح بفتح النوافذ المنبثقة لعرض المرفق');
        if (String(dataUrl).startsWith('data:application/pdf')) {
            w.document.write(`<title>${filename}</title><iframe src="${dataUrl}" style="width:100%;height:100vh;border:0;"></iframe>`);
        } else {
            w.document.write(`<title>${filename}</title><div style="text-align:center;background:#111;min-height:100vh;padding:20px;"><img src="${dataUrl}" style="max-width:100%;height:auto;background:#fff;" /></div>`);
        }
    } catch(e) {
        console.log(e);
        showToast('تعذر فتح المرفق');
    }
}

async function adminUploadPaymentInvoice(clientId, paymentNumber) {
    const client = db.clients.find(c => String(c.id) === String(clientId));
    if (!client) return showToast('العميل غير موجود');
    const payment = normalizePayments(client).find(p => Number(p.number) === Number(paymentNumber));
    if (!payment) return showToast('الدفعة غير موجودة');

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*,application/pdf';
    fileInput.onchange = async () => {
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async () => {
            payment.invoice = reader.result;
            payment.invoiceName = file.name;
            payment.note = payment.note || 'تم رفع فاتورة من الإدارة';
            await persistClientPayments(client);
            showToast('✅ تم رفع الفاتورة للعميل');
            adminOpenClientPayments(clientId);
        };
        reader.readAsDataURL(file);
    };
    fileInput.click();
}

function showVisitList(type) {

    let title = 'الزيارات';

    db.clients.forEach(client => {

            if (type === "today") {

function openModal(type) {
  const m = modalContents[type];
  if (!m) return;
  document.getElementById('modalTitle').textContent = m.title;
  document.getElementById('modalContent').innerHTML = m.html;
  document.getElementById('modalOverlay').classList.add('active');
  // ضبط رقم العقد التلقائي وبيانات الدخول
  if (type === 'newClient') {
    const el = document.getElementById('newClientId');
    if (el) el.value = '#' + db.nextId;
    const username = 'client' + db.nextId;
    const password = generatePassword(db.nextId);
    const unEl = document.getElementById('previewUsername');
    const pwEl = document.getElementById('previewPassword');
    if (unEl) unEl.textContent = username;
    if (pwEl) pwEl.textContent = password;
    setTimeout(() => { toggleManualPayments(); renderPaymentSchedulePreview(); }, 50);
  }
}

function toggleManualPayments() {
    const pay = document.getElementById('newClientPay')?.value;
    const box = document.getElementById('manualPaymentsBox');

    if (!box) return;

    box.style.display = pay === 'يدوي' ? 'block' : 'none';
}

function registerPayment() {

    const amount =
        Number(document.getElementById('paymentAmount').value || 0);

    const date =
        document.getElementById('paymentDate').value;

    if (!amount || !date) {
        alert('أدخل مبلغ الدفعة وتاريخها');
        return;
    }

    const history =
        document.getElementById('paymentsHistory');

    const item =
        document.createElement('div');

    item.style.padding = '8px';
    item.style.marginTop = '6px';
    item.style.background = '#fff';
    item.style.borderRadius = '8px';

    item.innerHTML = `
        <input type="hidden" class="manual-payment-amount" value="${amount}">
        <input type="hidden" class="manual-payment-date" value="${date}">
        <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;">
            <span>${amount.toLocaleString()} ريال - ${date}</span>
            <button type="button" onclick="this.closest('div[style*=padding]').remove(); updateManualPaymentsSummary();" style="border:none;background:#fee2e2;color:#b91c1c;border-radius:8px;padding:4px 8px;cursor:pointer;">حذف</button>
        </div>
    `;

    history.appendChild(item);

    document.getElementById('paymentAmount').value = '';
    document.getElementById('paymentDate').value = '';

    updateManualPaymentsSummary();
}

function generateVisitSchedule(startDate, visitsCount, frequency) {
    const schedule = [];

    if (!startDate || frequency === 'manual') {
        return schedule;
    }

    const start = new Date(startDate);

    for (let i = 0; i < visitsCount; i++) {
        const visitDate = new Date(start);

        if (frequency === 'monthly') {
            visitDate.setMonth(start.getMonth() + i);
        } else if (frequency === '15days') {
            visitDate.setDate(start.getDate() + (i * 15));
        } else if (frequency === '10days') {
            visitDate.setDate(start.getDate() + (i * 10));
        } else if (frequency === 'weekly') {
            visitDate.setDate(start.getDate() + (i * 7));
        }

        schedule.push({
            id: Date.now() + i,
            number: i + 1,
            date: visitDate.toISOString().split('T')[0],
            status: 'مجدولة',
            reportId: null
        });
    }

    return schedule;
}

function generatePaymentScheduleData() {
    const amount = Number(document.getElementById('newClientValue')?.value || 0);
    const planText = document.getElementById('newClientPay')?.value || 'يدوي';
    const startDate = document.getElementById('contractStartDate')?.value || new Date().toISOString().split('T')[0];

    if (!amount || planText === 'يدوي') return [];

    let count = 1;
    let stepMonths = 12;

    if (planText.includes('شهري')) { count = 12; stepMonths = 1; }
    else if (planText.includes('ربع')) { count = 4; stepMonths = 3; }
    else if (planText.includes('ثلث')) { count = 3; stepMonths = 4; }
    else if (planText.includes('نصف')) { count = 2; stepMonths = 6; }
    else if (planText.includes('سنوي')) { count = 1; stepMonths = 12; }

    const paymentValue = +(amount / count).toFixed(2);
    const payments = [];

    for (let i = 0; i < count; i++) {
        const d = new Date(startDate);
        d.setMonth(d.getMonth() + (i * stepMonths));
        payments.push({
            number: i + 1,
            amount: paymentValue,
            dueDate: d.toISOString().split('T')[0],
            status: 'غير مدفوعة',
            paidDate: '',
            receipt: '',
            receiptName: '',
            invoice: '',
            invoiceName: '',
            note: ''
        });
    }

    return payments;
}

    manualPayments: Array.from(document.querySelectorAll('#paymentsHistory > div')).map(item => {
        const amountInput = item.querySelector('.manual-payment-amount');
        const dateInput = item.querySelector('.manual-payment-date');
        const text = item.textContent.trim();
        const parts = text.split(' - ');
        return {
            amount: Number(amountInput?.value || parts[0].replace(/[^\d.]/g, '')) || 0,
            date: dateInput?.value || parts[1] || '',
            status: 'مدفوعة'
        };
    }),
    start: new Date().toISOString().split('T')[0],
    end: new Date(new Date().setFullYear(new Date().getFullYear()+1)).toISOString().split('T')[0]
  };

  if ((!newClient.payments || !newClient.payments.length) && Array.isArray(newClient.manualPayments) && newClient.manualPayments.length) {
      newClient.payments = newClient.manualPayments.map((p, idx) => ({
          number: idx + 1,
          amount: Number(p.amount || 0),
          dueDate: p.date || '',
          status: p.status || 'مدفوعة',
          paidDate: p.date || '',
          receipt: '',
          receiptName: '',
          invoice: '',
          invoiceName: '',
          note: 'دفعة يدوية مسجلة عند إنشاء العميل'
      }));
  }

  const existingIndex = db.clients.findIndex(c => String(c.id) === String(newClient.id));

  if (existingIndex !== -1 && Array.isArray(db.clients[existingIndex].payments) && db.clients[existingIndex].payments.length) {
      const oldPayments = db.clients[existingIndex].payments;
      if (!newClient.payments.length) {
          newClient.payments = oldPayments;
      } else {
          newClient.payments = newClient.payments.map((p, idx) => ({ ...p, ...(oldPayments[idx] || {}) }));
      }
  }

if (existingIndex !== -1) {
    newClient.username = db.clients[existingIndex].username;
    newClient.password = db.clients[existingIndex].password;
    db.clients[existingIndex] = {
        ...db.clients[existingIndex],
        ...newClient
    };
} else {
    db.clients.push(newClient);
    db.nextId++;
}
  saveDB();
  
  // حفظ في Firebase
  const clientToSave = existingIndex !== -1 ? db.clients[existingIndex] : newClient;

if (window.saveClientToFirebase) {
    await window.saveClientToFirebase(clientToSave);
}

  closeModal();
  showToast(`✅ تم إنشاء حساب ${name} — يوزر: ${username}`);
  renderPanel('all_clients');
}

async function deleteReportImage(reportId, field, index){
  const report = (db.reports || []).find(r => String(r.id) === String(reportId));
  if (!report) return showToast('التقرير غير موجود');
  if (!confirmDelete('حذف صورة من التقرير', 'سيتم حذف هذه الصورة فقط من التقرير.')) return;

  if (!Array.isArray(report[field])) return showToast('لا توجد صور في هذا القسم');
  report[field].splice(index, 1);

  if (field !== 'images') {
    report.images = [
      ...(report.executionImages || []).map(img => img.data || img),
      ...(report.pestImages || []).map(img => img.data || img),
      ...(report.paperReportImages || []).map(img => img.data || img),
      ...(report.baitMapImages || []).map(img => img.data || img),
      ...(report.rodentStationImages || []).map(img => img.data || img)
    ].filter(Boolean);
  }

  await persistReport(report);
  showToast('🗑️ تم حذف الصورة');
  openReportDetails(reportId);
}

async function adminDeletePaymentRow(clientId, paymentNumber){
  const client = db.clients.find(c => String(c.id) === String(clientId));
  if (!client) return;
  const payments = normalizePayments(client);
  const payment = payments.find(p => Number(p.number) === Number(paymentNumber));

  showToast('🗑️ تم حذف الدفعة');
  adminOpenClientPayments(clientId);
}

async function adminMarkPaymentPaid(clientId, paymentNumber) {
  const client = db.clients.find(c => String(c.id) === String(clientId));
  if (!client) return;
  const payment = normalizePayments(client).find(p => Number(p.number) === Number(paymentNumber));
  if (!payment) return;

  if (payment.status === 'مدفوعة' && !confirm('هذه الدفعة معتمدة مسبقاً. هل تريد تعديل بيانات اعتمادها؟')) return;

  const paidDate = prompt('تاريخ الدفع الفعلي:', payment.paidDate || new Date().toISOString().split('T')[0]);
  if (paidDate === null) return;
  const note = prompt('رقم الإيصال أو ملاحظة مختصرة:', payment.note || '');
  if (note === null) return;

  payment.status = 'مدفوعة';
  payment.paidDate = paidDate || new Date().toISOString().split('T')[0];
  payment.note = note || payment.note || '';
  await persistClientPayments(client);
  showToast('✅ تم اعتماد الدفعة كمدفوعة');
  adminOpenClientPayments(clientId);
}

async function adminRejectPaymentReceipt(clientId, paymentNumber) {

  const payment = normalizePayments(client).find(p => Number(p.number) === Number(paymentNumber));

  payment.status = 'غير مدفوعة';

async function adminUploadPaymentInvoice(clientId, paymentNumber) {
  const client = db.clients.find(c => String(c.id) === String(clientId));
  if (!client) return showToast('العميل غير موجود');
  const payment = normalizePayments(client).find(p => Number(p.number) === Number(paymentNumber));
  if (!payment) return showToast('الدفعة غير موجودة');

  if (payment.invoice && !confirm('يوجد فاتورة مرفوعة سابقاً. هل تريد استبدالها؟')) return;

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*,application/pdf';
  fileInput.onchange = async () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      payment.invoice = reader.result;
      payment.invoiceName = file.name;
      payment.invoiceUpdatedAt = new Date().toISOString();
      payment.note = payment.note || 'تم رفع فاتورة من الإدارة';
      await persistClientPayments(client);
      showToast('✅ تم رفع الفاتورة للعميل');
      adminOpenClientPayments(clientId);
    };
    reader.readAsDataURL(file);
  };
  fileInput.click();
}

}

function showVisitList(type) {
  let title = 'الزيارات';
  let visits = [];
  const today = new Date();
  today.setHours(0,0,0,0);
  const tomorrow = new Date(today);
  tomorrow.setDate(today.getDate() + 1);

  db.clients.forEach(client => {
    (client.visitSchedule || []).forEach((v, idx) => {
      const d = new Date(v.date);
      let cmp = new Date(d);
      cmp.setHours(0,0,0,0);
      let ok = false;

      if (type === "today") { title = 'زيارات اليوم'; ok = cmp.toDateString() === today.toDateString(); }
      if (type === "tomorrow") { title = 'زيارات الغد'; ok = cmp.toDateString() === tomorrow.toDateString(); }
      if (type === "week") {
        title = 'زيارات هذا الأسبوع';
        const end = new Date(today);
        end.setDate(today.getDate() + 7);
        ok = cmp >= today && cmp <= end;
      }
      if (type === "overdue") { title = 'الزيارات المتأخرة'; ok = cmp < today && v.status !== "مكتمل" && v.status !== "منفذة"; }

      if (ok) {
        visits.push({
          clientId: client.id,
          visitIndex: idx,
          client: client.name,
          tech: v.tech || "غير محدد",
          date: v.date,
          type: v.type || "زيارة دورية",
          status: v.status || "مجدولة"
        });
      }
    });
  });

  document.getElementById('appContent').innerHTML = `
    <div class="section-title">📅 ${title}</div>
    ${visits.length ? visits.map(v => `
      <div class="visit-item">
        <div class="visit-dot upcoming">📅</div>
        <div class="visit-info" onclick="openVisitDetails(${v.clientId}, '${v.date}')" style="cursor:pointer;">
          <div class="visit-title">${escapeHtml(v.client)}</div>
          <div class="visit-date">${v.date} — ${escapeHtml(v.type)}</div>
          <div class="visit-date">الفني: ${escapeHtml(v.tech)}</div>
          <div class="visit-admin-actions">
            ${v.status !== 'منفذة' && v.status !== 'مكتمل' ? `<button class="submit-btn green" onclick="event.stopPropagation(); adminMarkVisitCompleted(${v.clientId}, ${v.visitIndex}, '${type}')">✅ تم التنفيذ / تمت المراجعة</button>` : ''}
            <button class="submit-btn red" onclick="event.stopPropagation(); deleteClientVisit(${v.clientId}, ${v.visitIndex}, '${type}')">🗑️ حذف الزيارة</button>
          </div>
        </div>
        <span class="visit-badge upcoming">${escapeHtml(v.status)}</span>
      </div>
    `).join('') : `<div class="card" style="text-align:center;padding:24px;">لا توجد زيارات في هذا القسم.</div>`}

    <button class="submit-btn" style="margin-top:16px;background:#64748b;" onclick="renderPanel('all_visits')">رجوع لجدول الزيارات</button>
  `;
}

async function adminMarkVisitCompleted(clientId, visitIndex, returnType='overdue'){
  const client = db.clients.find(c => String(c.id) === String(clientId));
  if (!client || !client.visitSchedule || !client.visitSchedule[visitIndex]) return showToast('الزيارة غير موجودة');
  const visit = client.visitSchedule[visitIndex];
  if (!confirm('هل تريد نقل هذه الزيارة من المتأخرة/المجدولة إلى المنفذة؟')) return;
  visit.status = 'منفذة';
  visit.reviewedAt = new Date().toISOString();
  visit.reviewedBy = currentUser?.name || 'مدير النظام';
  client.used = Math.min(Number(client.used || 0) + 1, Number(client.visits || client.visitSchedule.length || 0));
  saveDB();
  if (typeof saveClientToFirebase === 'function') await saveClientToFirebase(client);
  showToast('✅ تم تحديث الزيارة');
  returnType === 'schedule' ? showClientSchedule(clientId) : showVisitList(returnType);
}

async function deleteClientVisit(clientId, visitIndex, returnType='schedule'){
  const client = db.clients.find(c => String(c.id) === String(clientId));
  if (!client || !client.visitSchedule || !client.visitSchedule[visitIndex]) return showToast('الزيارة غير موجودة');
  const visit = client.visitSchedule[visitIndex];
  if (!confirmDelete('حذف زيارة', `العميل: ${client.name}\nالتاريخ: ${visit.date || '-'}\nسيتم حذف هذه الزيارة من جدول العميل.`)) return;
  client.visitSchedule.splice(visitIndex, 1);
  saveDB();
  if (typeof saveClientToFirebase === 'function') await saveClientToFirebase(client);
  showToast('🗑️ تم حذف الزيارة');
  returnType === 'schedule' ? showClientSchedule(clientId) : showVisitList(returnType);
}

</script>

<script>
/* ===== v1.8 Critical Stabilization Patch ===== */
(function(){
  function normalizeDateOnly(value){
    if(!value) return '';
    const d = new Date(value);
    if(Number.isNaN(d.getTime())) return String(value).split('T')[0] || '';
    return d.toISOString().split('T')[0];
  }
  function isVisitCompletedStatus(status){
    const s = String(status || '').trim();
    return ['مكتمل','منفذة','تم التنفيذ','تمت المراجعة','completed','done'].includes(s);
  }
  window.isVisitCompletedStatus = isVisitCompletedStatus;

  function getAllVisitsNormalized(){
    const today = new Date(); today.setHours(0,0,0,0);
    return (db.clients || []).flatMap(client => (client.visitSchedule || []).map((v, index) => {
      const d = new Date(v.date);
      if(!Number.isNaN(d.getTime())) d.setHours(0,0,0,0);
      const completed = isVisitCompletedStatus(v.status) || !!v.doneAt || !!v.reportId;
      return {
        clientId: client.id,
        client: client.name || '—',
        visitIndex: index,
        number: v.number || index + 1,
        tech: v.tech || 'غير محدد',
        date: v.date || '',
        type: v.type || 'زيارة دورية',
        status: completed ? (v.status || 'منفذة') : (v.status || 'مجدولة'),
        completed,
        overdue: !completed && !Number.isNaN(d.getTime()) && d < today,
        raw: v
      };
    }));
  }
  window.getOverdueVisits = function(){
    return getAllVisitsNormalized().filter(v => v.overdue);
  };

  /* تنظيف حسابات الفنيين وإبقاء الأدمن + الفنيين الرسميين فقط */
  window.enforceOfficialTechnicians = function(){
    const officialTechs = [
      { username:'fahad', password:'tech@1234', role:'employee', name:'فهد' },
      { username:'neon',  password:'tech@1234', role:'employee', name:'نيون' },
      { username:'abbas', password:'tech@1234', role:'employee', name:'عباس' },
      { username:'raqib', password:'tech@1234', role:'employee', name:'رقيب' },
      { username:'thani', password:'tech@1234', role:'employee', name:'ثاني' }
    ];
    const admin = (db.users || []).find(u => u.role === 'admin') || { username:'admin', password:'stepro@2025', role:'admin', name:'مدير النظام' };
    db.users = [admin, ...officialTechs];
    saveDB();
  };
  enforceOfficialTechnicians();

  /* حماية إضافية عند تحميل قاعدة محلية قديمة */
  const oldLoadDB_v18 = window.loadDB || loadDB;
  window.loadDB = function(){
    const result = oldLoadDB_v18.apply(this, arguments);
    enforceOfficialTechnicians();
    return result;
  };
  loadDB = window.loadDB;

  /* إصلاح فتح تعديل العميل وتعبئة تاريخ بداية العقد المحفوظ */
  const oldEditClient_v18 = window.editClient || editClient;
  window.editClient = function(id){
    const client = (db.clients || []).find(c => String(c.id) === String(id));
    oldEditClient_v18.apply(this, arguments);
    setTimeout(() => {
      if(!client) return;
      const startInput = document.getElementById('contractStartDate');
      if(startInput) startInput.value = normalizeDateOnly(client.contractStartDate || client.start || startInput.value);
      const userPreview = document.getElementById('previewUsername');
      const passPreview = document.getElementById('previewPassword');
      if(userPreview) userPreview.textContent = client.username || '';
      if(passPreview) passPreview.textContent = client.password || '';
    }, 180);
  };
  editClient = window.editClient;

  /* تصحيح حفظ تاريخ بداية العقد عند الحفظ */
  const oldSaveNewClient_v18 = window.saveNewClient || saveNewClient;
  window.saveNewClient = async function(){
    const idValue = document.getElementById('newClientId')?.value || '';
    const editingId = parseInt(String(idValue).replace('#',''));
    const oldClient = (db.clients || []).find(c => String(c.id) === String(editingId));
    const explicitStart = document.getElementById('contractStartDate')?.value || '';
    const beforeSchedule = oldClient?.visitSchedule ? JSON.stringify(oldClient.visitSchedule) : '';
    await oldSaveNewClient_v18.apply(this, arguments);
    const saved = (db.clients || []).find(c => String(c.id) === String(editingId));
    if(saved){
      if(explicitStart){
        saved.contractStartDate = explicitStart;
        saved.start = saved.start || explicitStart;
      } else if(oldClient?.contractStartDate || oldClient?.start){
        saved.contractStartDate = oldClient.contractStartDate || oldClient.start;
      }
      /* إذا كان التعديل لم يغير بداية العقد بشكل واضح فلا نمسح الجدول القديم */
      if(oldClient && !explicitStart && beforeSchedule){
        try { saved.visitSchedule = JSON.parse(beforeSchedule); } catch(e){}
      }
      saveDB();
      if(window.saveClientToFirebase) {
        const ok = await window.saveClientToFirebase(saved);
        if(!ok && typeof showToast === 'function') showToast('⚠️ حُفظ محلياً ولم يُحفظ في Firebase');
      }
    }
  };
  saveNewClient = window.saveNewClient;

  /* مصدر واحد لعداد وقائمة الزيارات */

    const allVisits = getAllVisitsNormalized().sort((a,b)=>new Date(a.date)-new Date(b.date));
    const today = new Date(); today.setHours(0,0,0,0);

    const weekEnd = new Date(today); weekEnd.setDate(weekEnd.getDate()+7);
    const todayCount = allVisits.filter(v => new Date(v.date).toDateString() === today.toDateString()).length;
    const tomorrowCount = allVisits.filter(v => new Date(v.date).toDateString() === tomorrow.toDateString()).length;
    const weekCount = allVisits.filter(v => {

    }).length;
    const overdueCount = getOverdueVisits().length;
    const weekVisits = allVisits.filter(v => {
      const d = new Date(v.date); return !Number.isNaN(d.getTime()) && d >= today && d <= weekEnd;
    }).slice(0, 20);
    return `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div class="section-title" style="margin:0;">📅 جدول الزيارات</div>
        <button class="submit-btn" style="width:auto; padding:8px 16px; font-size:13px;" onclick="openModal('scheduleVisit')">+ جدولة زيارة</button>
      </div>
      <div class="stats-row cols-4" style="margin-bottom:20px;">
        <div class="stat-card" onclick="showVisitList('today')" style="cursor:pointer;"><span class="stat-icon">📍</span><span class="stat-num green">${todayCount}</span><span class="stat-label">زيارات اليوم</span></div>
        <div class="stat-card" onclick="showVisitList('tomorrow')" style="cursor:pointer;"><span class="stat-icon">➡️</span><span class="stat-num">${tomorrowCount}</span><span class="stat-label">زيارات الغد</span></div>
        <div class="stat-card" onclick="showVisitList('week')" style="cursor:pointer;"><span class="stat-icon">🗓️</span><span class="stat-num gold">${weekCount}</span><span class="stat-label">هذا الأسبوع</span></div>
        <div class="stat-card" onclick="showVisitList('overdue')" style="cursor:pointer;"><span class="stat-icon">⚠️</span><span class="stat-num red">${overdueCount}</span><span class="stat-label">متأخرة</span></div>
      </div>
      ${weekVisits.map(v => `
        <div class="visit-item">
          <div class="visit-dot ${v.overdue ? 'danger' : 'upcoming'}">📅</div>
          <div class="visit-info">
            <div class="visit-title">${escapeHtml(v.client)}</div>

  /* رسائل اتصال واضحة */

<!-- ===== v1.9.1 Pilot Operations Patch: payments workflow ===== -->
<style>

<script>
(function(){
  function psafe(v){
    try { if (typeof escapeHtml === 'function') return escapeHtml(v); } catch(e){}
    return String(v ?? '').replace(/[&<>"']/g, function(s){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]);});

  window.clientPayments = function(){
    const client = getCurrentClient();
    const stats = getPaymentStats(client);
    return `
      ${paymentSummaryCard(client)}
      <div class="section-title">💳 دفعاتي</div>
      ${renderBankDetailsCard()}
      ${renderClientPayAllBlock(client, stats)}

            ${p.invoiceName ? `<div class="file-chip">🧾 ${psafe(p.invoiceName)}</div>` : ''}

              ${p.invoice ? `<button class="submit-btn green" onclick="openAttachment('${p.invoice}', '${psafe(p.invoiceName || 'invoice')}')">🧾 عرض الفاتورة</button>` : ''}

  clientPayments = window.clientPayments;

  window.clientUploadReceipt = function(paymentNumber){
    const client = getCurrentClient();
    if(!client.id) return showToast('العميل غير موجود');
    const payment = normalizePayments(client).find(p => Number(p.number) === Number(paymentNumber));
    if(!payment) return showToast('الدفعة غير موجودة');
    if(payment.status === 'مدفوعة') return showToast('لا يمكن تعديل إيصال دفعة معتمدة');
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*,application/pdf';
    input.onchange = () => {
      const file = input.files && input.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        payment.receipt = reader.result;
        payment.receiptName = file.name;
        payment.status = 'بانتظار المراجعة';
        payment.note = payment.receiptName ? 'تم رفع/استبدال إيصال من العميل' : 'تم رفع إيصال من العميل';
        await persistClient(client);
        showToast('✅ تم رفع الإيصال وبانتظار اعتماد الإدارة');
        renderPanel('payments');
      };
      reader.readAsDataURL(file);

  window.clientDeleteReceipt = async function(paymentNumber){
    const client = getCurrentClient();
    const payment = normalizePayments(client).find(p => Number(p.number) === Number(paymentNumber));
    if(!payment || !payment.receipt) return showToast('لا يوجد إيصال');
    if(payment.status === 'مدفوعة') return showToast('لا يمكن حذف إيصال دفعة معتمدة');
    if(!confirm('هل أنت متأكد من حذف إيصال التحويل؟')) return;
    payment.receipt = '';
    payment.receiptName = '';
    if(payment.status === 'بانتظار المراجعة') payment.status = 'غير مدفوعة';
    payment.note = 'تم حذف الإيصال من العميل';
    await persistClient(client);
    showToast('🗑 تم حذف الإيصال');
    renderPanel('payments');
  };

  window.openPayRemainingModal = function(){
    const client = getCurrentClient(); const stats = getPaymentStats(client); const unpaid = payAllUnpaid(stats.payments);
    if(stats.remaining <= 0) return showToast('لا يوجد مبلغ متبقٍ');
    document.getElementById('modalTitle').textContent = 'دفع جميع المبلغ المتبقي';
    document.getElementById('modalContent').innerHTML = `
      <div class="pay-all-card">
        <h3>💰 إجمالي المتبقي: ${stats.remaining.toLocaleString()} ريال</h3>
        <div class="payment-note-muted">الدفعات المشمولة: ${unpaid.map(p => 'الدفعة #' + p.number + ' (' + Number(p.amount || 0).toLocaleString() + ' ريال)').join('، ')}</div>
      </div>
      ${renderBankDetailsCard()}
      <button class="submit-btn green" onclick="clientUploadPayAllReceipt(false)">📎 رفع إيصال تحويل المبلغ المتبقي</button>
      <button class="submit-btn" style="background:#64748b;margin-top:10px;" onclick="closeModal()">رجوع</button>`;
    document.getElementById('modalOverlay').classList.add('active');
  };

  window.clientUploadPayAllReceipt = function(replace){
    const client = getCurrentClient(); const stats = getPaymentStats(client); const unpaid = payAllUnpaid(stats.payments);
    if(!client.id) return showToast('العميل غير موجود');
    if(stats.remaining <= 0) return showToast('لا يوجد مبلغ متبقٍ');
    const input = document.createElement('input'); input.type='file'; input.accept='image/*,application/pdf';
    input.onchange = () => {
      const file = input.files && input.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        client.payAllRequest = {
          amount: stats.remaining,
          includedNumbers: unpaid.map(p => p.number),
          receipt: reader.result,
          receiptName: file.name,
          status: 'بانتظار المراجعة',

      };
      reader.readAsDataURL(file);

    input.click();

  window.clientDeletePayAllReceipt = async function(){
    const client = getCurrentClient(); const req = client.payAllRequest;
    if(!req || !req.receipt) return showToast('لا يوجد إيصال');
    if(req.status === 'مدفوعة') return showToast('لا يمكن حذف إيصال معتمد');
    if(!confirm('هل تريد حذف إيصال دفع جميع المتبقي؟')) return;
    const nums = req.includedNumbers || [];
    normalizePayments(client).forEach(p => {
      if(nums.includes(p.number) && p.status !== 'مدفوعة'){
        p.receipt=''; p.receiptName=''; p.status='غير مدفوعة'; p.note='تم حذف إيصال دفع جميع المتبقي';
      }
    });
    client.payAllRequest = null;
    await persistClient(client);
    showToast('🗑 تم حذف إيصال جميع المتبقي');

  function renderPayAllAdminBlock(client){
    const req = client.payAllRequest;

    return `
      <div class="pay-all-card">

        <div><strong>المبلغ:</strong> ${Number(req.amount || 0).toLocaleString()} ريال</div>
        <div class="payment-note-muted">الدفعات المشمولة: ${(req.includedNumbers || []).map(n => '#'+n).join('، ')}</div>
        <div class="payment-status-line">${paymentStatusBadge(req.status || 'بانتظار المراجعة')} <span class="file-chip">📎 ${psafe(req.receiptName || 'receipt')}</span></div>

          <button class="submit-btn" style="background:#64748b" onclick="openAttachment('${req.receipt}', '${psafe(req.receiptName || 'receipt')}')">👁️ عرض الإيصال</button>
          <button class="submit-btn green" onclick="adminApprovePayAll(${client.id})">✅ اعتماد جميع المتبقي</button>

          <button class="submit-btn red" style="background:#7f1d1d" onclick="adminDeletePayAllRequest(${client.id})">🗑 حذف الطلب</button>
        </div>
      </div>`;
  }

  const oldAdminOpen = window.adminOpenClientPayments || adminOpenClientPayments;
  window.adminOpenClientPayments = function(id){
    const client = getClientById(id);

      app.innerHTML = app.innerHTML.replace(marker, renderPayAllAdminBlock(client) + marker);

  };
  adminOpenClientPayments = window.adminOpenClientPayments;

  window.adminApprovePayAll = async function(clientId){
    const client = getClientById(clientId); if(!client || !client.payAllRequest) return;
    if(!confirm('هل تريد اعتماد دفع جميع المتبقي وتحويل الدفعات المشمولة إلى مدفوعة؟')) return;
    const req = client.payAllRequest; const nums = req.includedNumbers || [];
    normalizePayments(client).forEach(p => {
      if(nums.includes(p.number)){
        p.status='مدفوعة'; p.paidDate=todayIso();
        p.receipt = p.receipt || req.receipt; p.receiptName = p.receiptName || req.receiptName;
        p.note = 'تم اعتمادها ضمن دفع جميع المتبقي';
      }
    });
    req.status='مدفوعة'; req.approvedAt = new Date().toISOString();
    await persistClient(client);
    showToast('✅ تم اعتماد دفع جميع المتبقي');
    adminOpenClientPayments(clientId);
  };

  window.adminRejectPayAll = async function(clientId){
    const client = getClientById(clientId); if(!client || !client.payAllRequest) return;
    const reason = prompt('سبب رفض إيصال دفع جميع المتبقي:', 'الإيصال غير واضح');
    if(reason === null) return;
    const req = client.payAllRequest; req.status='مرفوض'; req.rejectionReason = reason;
    normalizePayments(client).forEach(p => {
      if((req.includedNumbers || []).includes(p.number) && p.status !== 'مدفوعة'){
        p.status='غير مدفوعة'; p.note = reason || 'تم رفض إيصال دفع جميع المتبقي';
      }
    });
    await persistClient(client);
    showToast('تم رفض طلب دفع جميع المتبقي');
    adminOpenClientPayments(clientId);
  };

  window.adminDeletePayAllRequest = async function(clientId){
    const client = getClientById(clientId); if(!client || !client.payAllRequest) return;
    if(!confirm('هل تريد حذف طلب دفع جميع المتبقي؟')) return;
    const nums = client.payAllRequest.includedNumbers || [];
    normalizePayments(client).forEach(p => {
      if(nums.includes(p.number) && p.status !== 'مدفوعة'){
        p.receipt=''; p.receiptName=''; p.status='غير مدفوعة'; p.note='تم حذف طلب دفع جميع المتبقي من الإدارة';
      }
    });
    client.payAllRequest = null;
    await persistClient(client);
    showToast('🗑 تم حذف الطلب');
    adminOpenClientPayments(clientId);
  };

  console.log('✅ v1.9.1 Payments Pilot Patch loaded');
})();
</script>


<script>
/* ===== v1.9.2 Focused Patch: payments merge + technician client log mobile cleanup ===== */
(function(){
  const PATCH_VERSION = 'v1.9.2-focused';

  function safeEsc(v){
    if (typeof esc === 'function') return esc(v ?? '');
    return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function normalizeStatus(s){
    s = String(s || '').trim();
    if (!s) return 'غير مدفوعة';
    if (s.includes('مدفوعة') && !s.includes('غير')) return 'مدفوعة';
    if (s.includes('مراجعة') || s.includes('انتظار')) return 'بانتظار المراجعة';
    return 'غير مدفوعة';
  }

  function getEditingClient(){
    try {
      const rawId = document.getElementById('newClientId')?.value || '';
      const id = String(rawId).replace('#','').trim();
      return (window.db?.clients || []).find(c => String(c.id) === id) || null;
    } catch(e){ return null; }
  }

  // 1) منع تضارب جدول الدفعات عند تعديل العميل:
  // نولّد الجدول حسب البيانات الجديدة، ثم ندمج حالات الدفعات والإيصالات والفواتير القديمة حسب رقم الدفعة.
  if (typeof generatePaymentScheduleData === 'function' && !window.__v192PaymentPatchApplied) {
    window.__v192PaymentPatchApplied = true;
    const oldGeneratePaymentScheduleData_v192 = generatePaymentScheduleData;

    window.generatePaymentScheduleData = function(){
      const generated = oldGeneratePaymentScheduleData_v192.apply(this, arguments) || [];
      const client = getEditingClient();
      const oldPayments = Array.isArray(client?.payments) ? client.payments : [];

      if (!oldPayments.length) return generated;

      const oldByNumber = {};
      oldPayments.forEach(p => {
        if (p && p.number != null) oldByNumber[String(p.number)] = p;
      });

      return generated.map(p => {
        const old = oldByNumber[String(p.number)];
        if (!old) return p;
        return {
          ...p,
          status: normalizeStatus(old.status),
          paidDate: old.paidDate || '',
          receipt: old.receipt || '',
          receiptName: old.receiptName || '',
          invoice: old.invoice || '',
          invoiceName: old.invoiceName || '',
          note: old.note || '',
          approvedBy: old.approvedBy || '',
          approvedAt: old.approvedAt || '',
          reviewedAt: old.reviewedAt || ''
        };
      });
    };

<script>
/* ===== v1.9.3 Stage 1 Patch: technician report flow + client log + admin cleanup ===== */
(function(){
  const PATCH_VERSION = 'v1.9.3-stage1';
  const esc = window.safeEsc || window.h || function(v){
    return String(v ?? '').replace(/[&<>"]/g, function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch];});
  };
  const todayISO = () => new Date().toISOString().slice(0,10);
  const normalizeStatus = (s) => String(s || '').trim();
  const isVisitCompleted = (v) => ['منفذة','مكتمل','تم التنفيذ','تمت المراجعة'].includes(normalizeStatus(v && v.status));
  function clientsList(){ return (window.db && Array.isArray(window.db.clients)) ? window.db.clients : []; }
  function reportsList(){ return (window.db && Array.isArray(window.db.reports)) ? window.db.reports : []; }
  function clientById(id){ return clientsList().find(c => String(c.id) === String(id)); }
  function reportsByClientLocal(clientId){
    return reportsList().filter(r => String(r.clientId) === String(clientId)).sort((a,b)=>(b.id||0)-(a.id||0));
  }
  function getClientVisits(client){
    if(!client) return [];
    if(Array.isArray(client.visitSchedule)) return client.visitSchedule;
    if(Array.isArray(client.visitsSchedule)) return client.visitsSchedule;
    if(Array.isArray(client.visitsList)) return client.visitsList;
    return [];
  }
  function getNextScheduledVisit(client){
    const visits = getClientVisits(client);
    let idx = visits.findIndex(v => !isVisitCompleted(v));
    if(idx < 0 && visits.length) idx = visits.length - 1;
    const visit = idx >= 0 ? visits[idx] : null;
    return { visit, index: idx };
  }
  function visitDefaultDate(client){
    const {visit,index} = getNextScheduledVisit(client);
    return {
      index,
      date: visit ? (visit.date || visit.defaultDate || visit.scheduledDate || visit.dueDate || '') : '',
      number: visit ? (visit.number || index + 1 || '') : ''
    };
  }

  /* 1) تنظيف واجهة الفني: لا يظهر رقم الجوال، والبحث بس بالاسم/رقم العقد */
  window.filterReportClients = function(){
    const q = (document.getElementById('reportClientSearch')?.value || '').toLowerCase().trim();
    const select = document.getElementById('reportClientSelect');
    if(!select) return;
    const current = select.value;
    const html = clientsList().filter(c => {
      const text = ((c.name||'')+' '+(c.englishName||'')+' '+(c.id||'')+' '+(c.contractNo||'')+' '+(c.username||'')).toLowerCase();
      return !q || text.includes(q);
    }).map(c => `<option value="${esc(c.id)}">#${esc(c.id)} — ${esc(c.name || 'بدون اسم')}</option>`).join('');
    select.innerHTML = html || '<option value="">لا يوجد عملاء مطابقون</option>';
    if(current && [...select.options].some(o => String(o.value) === String(current))) select.value = current;
    updateReportVisitDates();
    renderSelectedClientNextNote_v193();
  };

  function clientOptionsNoPhone(){
    return clientsList().map(c => `<option value="${esc(c.id)}">#${esc(c.id)} — ${esc(c.name || 'بدون اسم')}</option>`).join('');
  }

  window.updateReportVisitDates = function(){
    const id = document.getElementById('reportClientSelect')?.value;
    const c = clientById(id);
    const data = visitDefaultDate(c);
    const defaultInput = document.getElementById('scheduledVisitDate');
    const idxInput = document.getElementById('scheduledVisitIndex');
    const numBox = document.getElementById('scheduledVisitNumberHint');
    if(defaultInput) defaultInput.value = data.date || '';
    if(idxInput) idxInput.value = data.index >= 0 ? String(data.index) : '';
    if(numBox) numBox.textContent = data.number ? ('الزيارة رقم ' + data.number) : 'لا يوجد موعد افتراضي محفوظ';
  };

  function latestTechNote(client){
    const notes = Array.isArray(client?.techNotes) ? client.techNotes : [];
    return notes.slice().sort((a,b)=>String(b.createdAt||'').localeCompare(String(a.createdAt||'')))[0] || null;
  }
  window.renderSelectedClientNextNote_v193 = function(){
    const id = document.getElementById('reportClientSelect')?.value;
    const c = clientById(id);
    const note = latestTechNote(c);
    const box = document.getElementById('selectedClientNextNote');
    if(!box) return;
    box.innerHTML = note
      ? `<div class="tech-note-card"><b>📌 ملاحظة من الفني السابق</b><div style="margin-top:8px">${esc(note.note)}</div><div class="tech-note-mini">كتبها: ${esc(note.by||'-')} | ${esc(note.date||'')}</div></div>`
      : `<div class="tech-note-empty">لا توجد ملاحظة سابقة لهذا العميل</div>`;
  };

  window.employeeUpload = function(){
    const fileBlocks = [
      ['executionImages','صور التنفيذ','executionFilesText'],
      ['pestImages','صور الآفات','pestFilesText'],
      ['paperReportImages','صورة تقرير المتابعة الورقي','paperFilesText'],
      ['baitMapImages','صورة خريطة الطعوم','baitMapFilesText'],

    ].map(([id,lbl,txt]) => `<div class="form-group"><label class="form-label">📸 ${esc(lbl)}</label><input type="file" id="${id}" accept="image/*" multiple style="display:none" onchange="showFileNames('${id}','${txt}')"><div class="pest-upload-area" onclick="document.getElementById('${id}').click()"><div style="font-size:32px">📸</div><div>${esc(lbl)}</div><div id="${txt}" style="font-size:12px;color:var(--text-light)">لم يتم اختيار صور</div></div></div>`).join('');
    return `<div class="section-title">📤 رفع تقرير زيارة</div>
      <div class="card">
        <div class="form-group"><label class="form-label">ابحث عن العميل</label><input class="form-input" id="reportClientSearch" placeholder="اكتب اسم العميل أو رقم العقد" oninput="filterReportClients()"></div>
        <div class="form-group"><label class="form-label">اختر العميل</label><select class="form-select" id="reportClientSelect" onchange="updateReportVisitDates();renderSelectedClientNextNote_v193();">${clientOptionsNoPhone()}</select></div>
        <div id="selectedClientNextNote" style="margin-bottom:12px"></div>
        <div class="form-group"><label class="form-label">تاريخ الزيارة الافتراضي</label><input type="text" class="form-input" id="scheduledVisitDate" readonly placeholder="يظهر من جدول الزيارات"><input type="hidden" id="scheduledVisitIndex"><div id="scheduledVisitNumberHint" style="font-size:12px;color:var(--text-light);margin-top:4px"></div></div>
        <div class="form-group"><label class="form-label">تاريخ التنفيذ الفعلي</label><input type="date" class="form-input" id="actualExecutionDate" value="${todayISO()}"></div>
        <div class="form-group"><label class="form-label">نوع الخدمة</label><select class="form-select" id="serviceType"><option>زيارة دورية</option><option>طوارئ</option><option>متابعة</option><option>فحص مصائد الطعوم</option><option>مكافحة صراصير</option><option>مكافحة نمل أبيض</option><option>مكافحة قوارض</option><option>مكافحة طيور</option><option>تقرير متابعة ميدانية (ورقي)</option></select></div>
        <div class="form-group"><label class="form-label">المواد المستخدمة</label><input type="text" class="form-input" id="materialsInput"></div>
        <div class="form-group"><label class="form-label">ملاحظات الزيارة</label><textarea class="form-textarea" id="notesInput"></textarea></div>
        ${fileBlocks}
        <div id="reportUploadStatus" style="margin:10px 0;font-size:13px;color:var(--text-light)"></div>
        <button id="uploadReportBtn" class="submit-btn" onclick="saveVisitReport()">📋 رفع التقرير</button>
      </div>`;
  };
  employeeUpload = window.employeeUpload;

  const oldInitPanelJS_v193 = window.initPanelJS || (typeof initPanelJS === 'function' ? initPanelJS : null);
  window.initPanelJS = function(panelId){
    if(oldInitPanelJS_v193) oldInitPanelJS_v193.apply(this, arguments);
    if(panelId === 'report_upload') setTimeout(() => { updateReportVisitDates(); renderSelectedClientNextNote_v193(); }, 80);
  };
  if(typeof initPanelJS !== 'undefined') initPanelJS = window.initPanelJS;

  function setUploadState(text, color, disabled, done){
    const status = document.getElementById('reportUploadStatus');
    const btn = document.getElementById('uploadReportBtn');
    if(status){ status.textContent = text || ''; status.style.color = color || 'var(--text-light)'; }
    if(btn){ btn.disabled = !!disabled; btn.textContent = done ? '✅ تم رفع التقرير' : (disabled ? '⏳ جاري الرفع...' : '📋 رفع التقرير'); btn.style.opacity = disabled ? '.75' : '1'; }
  }
  async function compressImage_v193(file, maxWidth = 700, quality = 0.45){
    return new Promise((resolve,reject)=>{
      if(!file) return resolve(null);
      if(file.size > 15 * 1024 * 1024) return reject(new Error('الصورة كبيرة جداً: '+file.name));
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          let w = img.width, h = img.height;
          if(w > maxWidth){ h = Math.round(h * maxWidth / w); w = maxWidth; }
          const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          resolve({name:file.name, data:canvas.toDataURL('image/jpeg', quality)});
        };
        img.onerror = () => reject(new Error('تعذر قراءة الصورة: '+file.name));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('تعذر تحميل الصورة: '+file.name));
      reader.readAsDataURL(file);
    });
  }
  async function readImages_v193(inputId, maxFiles){
    const files = Array.from(document.getElementById(inputId)?.files || []);
    if(files.length > maxFiles) throw new Error('الحد الأقصى '+maxFiles+' صور لكل قسم');
    const result = [];
    for(const f of files) result.push(await compressImage_v193(f));
    return result.filter(Boolean);
  }

  /* 2) رفع التقرير: تاريخ افتراضي readonly + تاريخ تنفيذ فعلي + منع الضغط مرتين */
  window.saveVisitReport = async function(){
    const btn = document.getElementById('uploadReportBtn');

    if(!clientId) { if(typeof showToast==='function') showToast('⚠️ اختر العميل أولاً'); return; }

      setUploadState('جاري ضغط الصور...', '#1d4ed8', true, false);
      const reportId = Date.now();
      const scheduledVisitIndexRaw = document.getElementById('scheduledVisitIndex')?.value;

      const scheduledVisitDate = document.getElementById('scheduledVisitDate')?.value || '';
      const actualExecutionDate = document.getElementById('actualExecutionDate')?.value || todayISO();
      const executionImages = await readImages_v193('executionImages', 3);
      const pestImages = await readImages_v193('pestImages', 3);
      const paperReportImages = await readImages_v193('paperReportImages', 2);
      const baitMapImages = await readImages_v193('baitMapImages', 2);
      const rodentStationImages = await readImages_v193('rodentStationImages', 6);
      setUploadState('جاري رفع التقرير...', '#1d4ed8', true, false);
      const fullReport = {
        id: reportId,
        clientId: Number(clientId),
        client: client.name || 'عميل',
        tech: (window.currentUser && (currentUser.name || currentUser.username)) || 'فني',
        employeeName: (window.currentUser && (currentUser.name || currentUser.username)) || 'فني',
        type: document.getElementById('serviceType')?.value || 'زيارة فنية',
        materials: document.getElementById('materialsInput')?.value || '',
        notes: document.getElementById('notesInput')?.value || '',
        scheduledVisitDate,
        actualExecutionDate,
        visitIndex: scheduledVisitIndex,
        executionImages,pestImages,paperReportImages,baitMapImages,rodentStationImages,
        images:[...executionImages,...pestImages,...paperReportImages,...baitMapImages,...rodentStationImages].map(x=>x.data),
        date: actualExecutionDate,
        status:'مكتمل',
        createdAt:new Date().toISOString()
      };
      if(!Array.isArray(window.db.reports)) window.db.reports = [];
      window.db.reports.unshift(fullReport);
      const visits = getClientVisits(client);
      let v = (scheduledVisitIndex >= 0 && visits[scheduledVisitIndex]) ? visits[scheduledVisitIndex] : visits.find(x=>!isVisitCompleted(x));
      if(v){
        v.status = 'منفذة';
        v.reportId = reportId;
        v.reportType = fullReport.type;
        v.scheduledVisitDate = scheduledVisitDate || v.date || v.defaultDate || v.scheduledDate || '';
        v.executionDate = actualExecutionDate;
        v.doneDate = actualExecutionDate;
        v.doneAt = new Date().toISOString();
      }
      client.used = (client.used || 0) + 1;
      if(typeof saveDB === 'function') saveDB();
      if(typeof window.saveClientToFirebase === 'function') await window.saveClientToFirebase(client);
      if(window.firebase && firebase.database) await firebase.database().ref('reports/' + reportId).set(fullReport);

    }catch(err){
